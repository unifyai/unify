name: Flow Smoke
run-name: >-
  ${{
    github.event_name == 'pull_request' && 'Flow smoke (staging → main gate)' ||
    github.event_name == 'push' && 'Flow smoke (commit)' ||
    'Flow smoke (manual)'
  }}

# Live end-to-end smoke of the core product flows in tests/flows. These drive
# the real Unity brain through a local Orchestra, so every run makes paid LLM
# calls and cannot be cache-replayed: the brain embeds fresh per-run identifiers
# (task/log/context ids, timestamps) in later-turn prompts, so read-only cache
# replay misses and fails. That is why the flows must live here on a dedicated
# spend-acknowledged trigger rather than in the normal read-only Tests matrix
# (the Tests discover job blocks tests/flows for the same reason).
#
# Triggers: a [run-flows] marker on any push, every staging -> main pull
# request (the release gate), and manual dispatch (LLM_SPEND_OK acknowledged).

on:
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: "Session timeout"
        required: false
        type: number
        default: 30
      confirm_llm_spend:
        description: "LLM_SPEND_OK for live flows; CANCEL_SMOKE_OK for cancel-latency diagnostics (no LLM)"
        required: true
        type: string
  push:
    branches:
    - '**'
  pull_request:
    branches:
    - main

permissions:
  contents: read

# Share a group across the push and pull_request events for the same source
# branch so a [run-flows] push and its staging -> main PR don't double-run.
# Debouncer semantics on push/dispatch: running smoke completes; only the
# pending slot is replaced. PRs cancel in-progress for fast feedback.
concurrency:
  group: flow-smoke-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Cancel-latency diagnostics (no LLM). Dispatch with confirm_llm_spend=
  # CANCEL_SMOKE_OK. Uses this workflow because it already exists on main
  # (required for workflow_dispatch) and has a concurrency group independent
  # of the Tests matrix — so hung Tests runs cannot block these experiments.
  # ---------------------------------------------------------------------------
  cancel-smoke-A:
    name: "A: baseline sleep"
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_llm_spend == 'CANCEL_SMOKE_OK'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Hang
      run: |
        set -u
        echo "SMOKE_A start $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        while true; do
          echo "SMOKE_A heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sleep 10
        done

  cancel-smoke-B:
    name: "B: tmux wait, no trap"
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_llm_spend == 'CANCEL_SMOKE_OK'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Hang
      run: |
        set -u
        echo "SMOKE_B start $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        tmux new-session -d -s smoke_b "bash -c 'while true; do echo tmux_b \$(date -u +%H:%M:%S); sleep 10; done'"
        while tmux has-session -t smoke_b 2>/dev/null; do
          echo "SMOKE_B heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sleep 5
        done
        echo "SMOKE_B session ended unexpectedly"

  cancel-smoke-C:
    name: "C: tmux + kill-server trap"
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_llm_spend == 'CANCEL_SMOKE_OK'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Hang
      run: |
        set -u
        cleanup() {
          echo "SMOKE_C caught signal $(date -u +%Y-%m-%dT%H:%M:%SZ) — kill-server"
          tmux kill-server 2>/dev/null || true
          exit 143
        }
        trap cleanup INT TERM
        echo "SMOKE_C start $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        tmux new-session -d -s smoke_c "bash -c 'while true; do echo tmux_c \$(date -u +%H:%M:%S); sleep 10; done'"
        while tmux has-session -t smoke_c 2>/dev/null; do
          echo "SMOKE_C heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sleep 5
        done
        echo "SMOKE_C session ended unexpectedly"

  cancel-smoke-D:
    name: "D: parallel_run-style trap"
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_llm_spend == 'CANCEL_SMOKE_OK'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Hang
      run: |
        set -u
        cleanup() {
          local sig="${1:-TERM}"
          echo "SMOKE_D caught signal ${sig} $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          tmux list-panes -t smoke_d -F '#{pane_pid}' 2>/dev/null | while read -r pid; do
            if [[ -n "$pid" ]]; then
              kill -TERM "-$pid" 2>/dev/null || true
            fi
          done
          sleep 0.1
          tmux kill-session -t smoke_d 2>/dev/null || true
          echo "SMOKE_D cleanup complete $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          exit 143
        }
        trap 'cleanup INT' INT
        trap 'cleanup TERM' TERM
        echo "SMOKE_D start $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        tmux new-session -d -s smoke_d "bash -c 'while true; do echo tmux_d \$(date -u +%H:%M:%S); sleep 10; done'"
        while tmux has-session -t smoke_d 2>/dev/null; do
          echo "SMOKE_D heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sleep 5
        done
        echo "SMOKE_D session ended unexpectedly"

  cancel-smoke-E:
    name: "E: always() 120s after hang"
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_llm_spend == 'CANCEL_SMOKE_OK'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Hang
      run: |
        set -u
        echo "SMOKE_E hang start $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        while true; do
          echo "SMOKE_E heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sleep 10
        done
    - name: Slow always cleanup
      if: always()
      run: |
        echo "SMOKE_E always-start $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        sleep 120
        echo "SMOKE_E always-done $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - name: Cancel-only cleanup
      if: cancelled()
      run: echo "SMOKE_E cancelled-cleanup $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  flows:
    name: Flow smoke
    runs-on: ubuntu-latest-8-cores
    environment: unity-testing
    timeout-minutes: 60
    # Run on: manual LLM_SPEND_OK dispatch, a [run-flows] push, or a staging -> main PR.
    # CANCEL_SMOKE_OK dispatches are handled by the cancel-smoke-* jobs above.
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.confirm_llm_spend == 'LLM_SPEND_OK') ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[run-flows]')) ||
      (github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref == 'staging')
    env:
      UNIFY_TESTS_RAND_PROJ: "false"
      UNIFY_TESTS_DELETE_PROJ_ON_START: "false"
      UNIFY_TESTS_DELETE_PROJ_ON_EXIT: "false"
      # Flows always run live: the brain's later-turn prompts are not
      # deterministic across runs, so a read-only cache replay always misses.
      UNILLM_CACHE: "false"
      ORCHESTRA_REPO_PATH: ${{ github.workspace }}/orchestra
      ORCHESTRA_URL: ${{ vars.ORCHESTRA_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_CI_API_KEY }}
      # The brain (unillm) routes LLM calls through OpenRouter; without this the
      # slow-brain turns fail with a 401 "No cookie auth credentials found" and
      # no reply lands.
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_CI_API_KEY }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      # Orchestra routes embeddings (embed() derived logs / Builtins seeding)
      # through OpenRouter, so the CI-local Orchestra needs this key too.
      ORCHESTRA_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_CI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_CI_API_KEY }}
      # Brain default model is gpt-5.6-sol@openai (OpenAI). OPENAI_API_KEY
      # above covers slow-brain auth; DEEPSEEK remains for DeepSeek-specific tests.
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_CI_API_KEY }}
      # Communication service URL (org secret is still named UNITY_COMMS_URL).
      UNITY_COMMS_URL: ${{ secrets.UNITY_COMMS_URL }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_LOCATION: ${{ vars.GCP_LOCATION }}
      ORCHESTRA_GCP_BUCKET_NAME: ${{ vars.GCP_BUCKET_LOGS }}
      ORCHESTRA_GCP_ASSISTANT_MEDIA_BUCKET_NAME: ${{ vars.GCP_BUCKET_ASSISTANT_IMAGES }}
      ORCHESTRA_GCP_ASSISTANT_CALL_RECORDINGS_BUCKET_NAME: ${{ vars.GCP_BUCKET_RECORDINGS }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      UNIFY_KEY: ${{ secrets.UNIFY_KEY }}
      # The Builtins project is reserved (admin-key-only) in Orchestra. The
      # fresh CI-local Orchestra (host uvicorn, inherits this env) adopts this
      # as its admin key, and the test Builtins seed uses the same value so it
      # can create/converge the reserved project. Local-only throwaway key.
      ORCHESTRA_ADMIN_KEY: local-admin-key
      PYTHONPATH: ${{ github.workspace }}/unillm:${{ github.workspace }}/unisdk
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Acknowledge LLM spend (manual runs)
      if: github.event_name == 'workflow_dispatch'
      run: |
        if [[ "${{ inputs.confirm_llm_spend }}" != "LLM_SPEND_OK" ]]; then
          echo "Refusing live flow smoke: confirm_llm_spend must be LLM_SPEND_OK" >&2
          exit 1
        fi

    - name: Clone orchestra repo for local deployment
      uses: actions/checkout@v4
      with:
        repository: unifyai/orchestra
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: orchestra
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Clone unify repo
      uses: actions/checkout@v4
      with:
        repository: unifyai/unisdk
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: unisdk
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Clone unillm repo
      uses: actions/checkout@v4
      with:
        repository: unifyai/unillm
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: unillm
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

    - name: Get orchestra commit SHA
      id: orchestra-sha
      run: echo "sha=$(git -C orchestra rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install apt packages
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          tmux zsh portaudio19-dev libnss3-dev libatk-bridge2.0-dev libdrm2 \
          libxkbcommon0 libgtk-3-dev libgbm-dev libgirepository1.0-dev \
          libasound2t64 libatspi2.0-0 libgtk-3-0 libnspr4 libwayland-client0 \
          libxcomposite1 libxdamage1 libxrandr2 xvfb

    - name: Install uv and poetry
      run: |
        pip install uv
        pip install poetry

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock', 'unillm/pyproject.toml', 'unisdk/pyproject.toml') }}
        restore-keys: |
          uv-${{ runner.os }}-

    - name: Configure unify/unillm paths for CI
      run: |
        # The checked-out dependency repos live in the workflow workspace, so
        # point uv at those paths instead of refetching Git sources.
        python3 <<'PY'
        from pathlib import Path

        pyproject = Path("pyproject.toml")
        text = pyproject.read_text()
        replacements = {
            'unisdk = { git = "https://github.com/unifyai/unisdk.git", branch = "staging" }': 'unisdk = { path = "./unisdk", editable = true }',
            'unillm = { git = "https://github.com/unifyai/unillm.git", branch = "staging" }': 'unillm = { path = "./unillm", editable = true }',
            'unisdk = { path = "../unisdk", editable = true }': 'unisdk = { path = "./unisdk", editable = true }',
            'unillm = { path = "../unillm", editable = true }': 'unillm = { path = "./unillm", editable = true }',
        }
        for old, new in replacements.items():
            text = text.replace(old, new)
        pyproject.write_text(text)

        unillm_pyproject = Path("unillm/pyproject.toml")
        text = unillm_pyproject.read_text()
        text = text.replace(
            'unisdk = { git = "https://github.com/unifyai/unisdk.git", branch = "staging" }',
            'unisdk = { path = "../unisdk", editable = true }',
        )
        unillm_pyproject.write_text(text)
        PY

    - name: Sync dependencies with uv
      run: uv sync --all-groups

    - name: Cache Playwright assets
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright assets
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: uv run playwright install --with-deps

    - name: Cache orchestra poetry dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pypoetry
        key: poetry-orchestra-${{ runner.os }}-${{ steps.orchestra-sha.outputs.sha }}
        restore-keys: |
          poetry-orchestra-${{ runner.os }}-

    - name: Install orchestra dependencies
      run: |
        cd "$ORCHESTRA_REPO_PATH"
        poetry install --no-interaction

    - name: Run flow smoke
      id: run-tests
      run: |
        set +e
        TIMEOUT=$(( ${{ inputs.timeout_minutes || 30 }} * 60 ))

        # xvfb-run swallows signals; start Xvfb directly so cancellation
        # reaches parallel_run.sh.
        Xvfb :99 -screen 0 1920x1080x24 &
        XVFB_PID=$!
        export DISPLAY=:99
        trap "kill $XVFB_PID 2>/dev/null" EXIT

        echo "Running flow smoke with UNILLM_CACHE=$UNILLM_CACHE"
        tests/parallel_run.sh --timeout "$TIMEOUT" tests/flows
        TEST_EXIT_CODE=$?
        echo "exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"
        exit $TEST_EXIT_CODE

    - name: Stop local orchestra
      if: always()
      continue-on-error: true
      run: orchestra/scripts/local.sh stop || true

    - name: Upload flow smoke logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: flow-smoke-logs-${{ github.run_id }}
        path: logs/
        if-no-files-found: ignore
        retention-days: 14
