name: LLM Cache Consolidate
run-name: LLM cache consolidate from run ${{ inputs.artifacts_run_id }}

# Pull cache-diff artifacts from a prior LLM Cache Refresh run, merge them into
# the shared Actions cache, and save. Use when refresh completed/cancelled
# without its consolidate job (e.g. force-cancel of a hung shard).
on:
  workflow_dispatch:
    inputs:
      artifacts_run_id:
        description: "GitHub Actions run id that uploaded cache-diff-* artifacts"
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: llm-cache-consolidate-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  consolidate:
    name: Consolidate and store cache
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Restore existing consolidated cache
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    - name: Download cache diffs from source run
      uses: actions/download-artifact@v4
      with:
        pattern: cache-diff-${{ inputs.artifacts_run_id }}-*
        path: cache-artifacts
        merge-multiple: false
        repository: ${{ github.repository }}
        run-id: ${{ inputs.artifacts_run_id }}
        github-token: ${{ github.token }}

    - name: Consolidate .cache.ndjson
      run: |
        python3 .github/scripts/consolidate_cache.py --artifacts-dir cache-artifacts
        touch .cache.ndjson
        echo "Consolidated entry count: $(grep -c . .cache.ndjson || true)"
        ls -lh .cache.ndjson

    - name: Store consolidated cache
      uses: actions/cache/save@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
