name: LLM Cache Refresh
run-name: LLM cache refresh ${{ inputs.test_path }}

on:
  workflow_dispatch:
    inputs:
      test_path:
        description: "Path(s) to refresh/evaluate (space-separated); '.' for full suite"
        required: true
        type: string
      parallel_run_args:
        description: "Extra parallel_run.sh args; do not set UNILLM_CACHE here"
        required: false
        type: string
        default: ""
      cache_mode:
        description: "write-misses refreshes cache; uncached-eval bypasses cache"
        required: true
        type: choice
        default: write-misses
        options:
        - write-misses
        - uncached-eval
      timeout_minutes:
        description: "Per-matrix-job session timeout"
        required: false
        type: number
        default: 120
      max_parallel:
        description: "Max concurrent matrix refresh jobs"
        required: false
        type: number
        default: 20
      confirm_llm_spend:
        description: "Type LLM_SPEND_OK to acknowledge this may call paid LLM APIs"
        required: true
        type: string
      confirm_full_matrix:
        description: "Type FULL_MATRIX_OK to allow test_path='.'"
        required: false
        type: string
        default: ""
      confirm_repeat:
        description: "Type REPEAT_OK to allow --repeat N where N > 1"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  actions: read

# One refresh campaign per branch. Inside a campaign, the matrix parallelizes.
concurrency:
  group: llm-cache-refresh-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate spend controls
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Validate spend controls
      shell: bash
      run: |
        TEST_PATH="${{ inputs.test_path }}"
        EXTRA_ARGS="${{ inputs.parallel_run_args }}"

        fail() {
          echo "Refusing protected LLM run: $1" >&2
          exit 1
        }

        [[ -n "$TEST_PATH" ]] || fail "test_path is required"
        # CONSOLIDATE_FROM:<run_id> skips paid refresh and only merges that
        # run's cache-diff artifacts into the shared Actions cache.
        if [[ "$TEST_PATH" == CONSOLIDATE_FROM:* ]]; then
          RUN_ID="${TEST_PATH#CONSOLIDATE_FROM:}"
          [[ "$RUN_ID" =~ ^[0-9]+$ ]] || fail "CONSOLIDATE_FROM requires a numeric run id"
          [[ "${{ inputs.cache_mode }}" == "write-misses" ]] || fail "CONSOLIDATE_FROM requires cache_mode=write-misses"
          echo "Consolidate-only mode from run $RUN_ID"
          exit 0
        fi
        # EXPORT_CACHE restores the shared Actions .cache.ndjson and uploads
        # it as an artifact for local sync (no LLM spend).
        if [[ "$TEST_PATH" == "EXPORT_CACHE" ]]; then
          echo "Export-only mode: restore shared cache and upload artifact"
          exit 0
        fi

        [[ "${{ inputs.confirm_llm_spend }}" == "LLM_SPEND_OK" ]] || fail "confirm_llm_spend must be LLM_SPEND_OK"
        if [[ "$TEST_PATH" == "." ]]; then
          [[ "${{ inputs.confirm_full_matrix }}" == "FULL_MATRIX_OK" ]] || fail "test_path='.' requires confirm_full_matrix=FULL_MATRIX_OK"
        fi
        read -ra ARG_TOKENS <<< "$EXTRA_ARGS"
        for i in "${!ARG_TOKENS[@]}"; do
          token="${ARG_TOKENS[$i]}"
          next="${ARG_TOKENS[$((i+1))]:-}"
          repeat_value=""
          if [[ "$token" == "--repeat" ]]; then
            repeat_value="$next"
          elif [[ "$token" == --repeat=* ]]; then
            repeat_value="${token#--repeat=}"
          fi
          if [[ "$repeat_value" =~ ^[0-9]+$ && "$repeat_value" -gt 1 ]]; then
            [[ "${{ inputs.confirm_repeat }}" == "REPEAT_OK" ]] || fail "--repeat N where N > 1 requires confirm_repeat=REPEAT_OK"
          fi
        done
        if [[ "$EXTRA_ARGS" == *"UNILLM_CACHE="* ]]; then
          fail "this workflow owns UNILLM_CACHE through cache_mode"
        fi

  discover:
    name: Discover matrix
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    outputs:
      test_dirs: ${{ steps.set-matrix.outputs.test_dirs }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - id: set-matrix
      shell: bash
      run: |
        TEST_PATH="${{ inputs.test_path }}"
        declare -a RAW_PATHS=()
        declare -a PATHS=()

        if [[ "$TEST_PATH" == CONSOLIDATE_FROM:* || "$TEST_PATH" == "EXPORT_CACHE" ]]; then
          # Placeholder matrix value; refresh job is skipped in these modes.
          echo 'test_dirs=["__consolidate_only__"]' >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ "$TEST_PATH" == "." ]]; then
          while IFS= read -r path; do
            PATHS+=("$path")
          done < <(python3 .github/scripts/discover_test_paths.py)
        else
          read -ra RAW_PATHS <<< "$TEST_PATH"
          while IFS= read -r path; do
            PATHS+=("$path")
          done < <(python3 .github/scripts/discover_test_paths.py "${RAW_PATHS[@]}")
        fi

        # flows force UNILLM_CACHE=false in conftest — they burn spend without writing cache.
        FILTERED=()
        for _p in "${PATHS[@]}"; do
          if [[ "$_p" == *tests/flows* ]]; then
            echo "Skipping live-only path (no cache writes): $_p" >&2
            continue
          fi
          FILTERED+=("$_p")
        done
        PATHS=("${FILTERED[@]}")

        if (( ${#PATHS[@]} == 0 )); then
          echo "Error: no refreshable test paths after filtering" >&2
          exit 1
        fi

        echo "Matrix entries (${#PATHS[@]}):" >&2
        printf '  %s\n' "${PATHS[@]}" >&2

        python3 - <<'PY' "${PATHS[@]}"
        import json, os, sys
        paths = sys.argv[1:]
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"test_dirs={json.dumps(paths)}\n")
        PY

  refresh:
    name: refresh (${{ matrix.test_path }})
    runs-on: ubuntu-latest-8-cores
    needs: [validate, discover]
    if: ${{ !startsWith(inputs.test_path, 'CONSOLIDATE_FROM:') && inputs.test_path != 'EXPORT_CACHE' }}
    environment: unity-llm-cache-refresh
    timeout-minutes: 130
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      matrix:
        test_path: ${{ fromJSON(needs.discover.outputs.test_dirs) }}
    env:
      UNIFY_TESTS_RAND_PROJ: "false"
      UNIFY_TESTS_DELETE_PROJ_ON_START: "false"
      UNIFY_TESTS_DELETE_PROJ_ON_EXIT: "false"
      UNILLM_CACHE: ${{ inputs.cache_mode == 'uncached-eval' && 'false' || 'true' }}
      ORCHESTRA_REPO_PATH: ${{ github.workspace }}/orchestra
      UNIFY_DEPLOY_REPO_PATH: ${{ github.workspace }}/unify-deploy
      LOCAL_STACK_NO_AUTO: "1"
      ORCHESTRA_URL: ${{ vars.ORCHESTRA_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_CI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_CI_API_KEY }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      ORCHESTRA_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_CI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_CI_API_KEY }}
      UNITY_COMMS_URL: ${{ secrets.UNITY_COMMS_URL }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_LOCATION: ${{ vars.GCP_LOCATION }}
      ORCHESTRA_GCP_BUCKET_NAME: ${{ vars.GCP_BUCKET_LOGS }}
      ORCHESTRA_GCP_ASSISTANT_MEDIA_BUCKET_NAME: ${{ vars.GCP_BUCKET_ASSISTANT_IMAGES }}
      ORCHESTRA_GCP_ASSISTANT_CALL_RECORDINGS_BUCKET_NAME: ${{ vars.GCP_BUCKET_RECORDINGS }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      UNIFY_KEY: ${{ secrets.UNIFY_KEY }}
      ORCHESTRA_ADMIN_KEY: local-admin-key
      PYTHONPATH: ${{ github.workspace }}/unillm:${{ github.workspace }}/unisdk
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Normalize test path for artifacts
      id: normalize-path
      shell: bash
      run: |
        RAW_PATH='${{ matrix.test_path }}'
        normalized=$(echo "$RAW_PATH" | tr '/ *' '___' | tr -cd '[:alnum:]_-' | cut -c1-80)
        echo "test_path_normalized=$normalized" >> "$GITHUB_OUTPUT"

    - name: Clone orchestra repo for local deployment
      uses: actions/checkout@v4
      with:
        repository: unifyai/orchestra
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: orchestra
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Clone unisdk repo
      uses: actions/checkout@v4
      with:
        repository: unifyai/unisdk
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: unisdk
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Clone unillm repo
      uses: actions/checkout@v4
      with:
        repository: unifyai/unillm
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: unillm
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2.1.13
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install apt packages
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          tmux zsh portaudio19-dev libnss3-dev libatk-bridge2.0-dev libdrm2 \
          libxkbcommon0 libgtk-3-dev libgbm-dev libgirepository1.0-dev \
          libasound2t64 libatspi2.0-0 libgtk-3-0 libnspr4 libwayland-client0 \
          libxcomposite1 libxdamage1 libxrandr2 xvfb

    - name: Install uv and poetry
      run: |
        pip install uv
        pip install poetry

    - name: Configure local package paths
      run: |
        sed -i 's|path = "../unisdk"|path = "./unisdk"|g' pyproject.toml
        sed -i 's|path = "../unillm"|path = "./unillm"|g' pyproject.toml

    - name: Sync dependencies with uv
      run: uv sync --all-groups

    - name: Install Playwright assets
      run: uv run playwright install --with-deps

    - name: Install orchestra dependencies
      run: |
        cd "$ORCHESTRA_REPO_PATH"
        poetry install --no-interaction

    - name: Restore existing consolidated cache
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    - name: Run protected LLM tests
      id: run-tests
      shell: bash
      run: |
        set +e
        TIMEOUT=$(( ${{ inputs.timeout_minutes }} * 60 ))
        TEST_PATH="${{ matrix.test_path }}"
        EXTRA_ARGS="${{ inputs.parallel_run_args }}"

        Xvfb :99 -screen 0 1920x1080x24 &
        XVFB_PID=$!
        export DISPLAY=:99
        trap "kill $XVFB_PID 2>/dev/null" EXIT

        echo "Running protected LLM shard with UNILLM_CACHE=$UNILLM_CACHE path=$TEST_PATH"
        # shellcheck disable=SC2086
        tests/parallel_run.sh --timeout "$TIMEOUT" $TEST_PATH $EXTRA_ARGS
        TEST_EXIT_CODE=$?
        echo "exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"
        exit $TEST_EXIT_CODE

    - name: Upload cache diff
      if: always() && inputs.cache_mode == 'write-misses'
      uses: actions/upload-artifact@v4
      with:
        name: cache-diff-${{ github.run_id }}-${{ steps.normalize-path.outputs.test_path_normalized }}
        path: .cache_write.ndjson
        if-no-files-found: ignore
        include-hidden-files: true
        retention-days: 7

    - name: Stop local orchestra
      if: always()
      continue-on-error: true
      run: orchestra/scripts/local.sh stop || true

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: protected-llm-logs-${{ github.run_id }}-${{ steps.normalize-path.outputs.test_path_normalized }}
        path: logs/
        if-no-files-found: ignore
        retention-days: 7

  export-cache:
    name: Export shared cache artifact
    runs-on: ubuntu-latest
    needs: [validate, discover]
    if: inputs.test_path == 'EXPORT_CACHE'
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Restore shared .cache.ndjson
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    - name: Verify restored cache
      run: |
        test -f .cache.ndjson || { echo "No .cache.ndjson restored" >&2; exit 1; }
        echo "Entry count: $(grep -c . .cache.ndjson || true)"
        ls -lh .cache.ndjson

    - name: Upload .cache.ndjson for local sync
      uses: actions/upload-artifact@v4
      with:
        name: cache-ndjson-upstream
        path: .cache.ndjson
        if-no-files-found: error
        retention-days: 3
        compression-level: 0

  consolidate:
    name: Consolidate and store cache
    runs-on: ubuntu-latest
    needs: [validate, discover, refresh]
    if: always() && needs.validate.result == 'success' && inputs.cache_mode == 'write-misses' && inputs.test_path != 'EXPORT_CACHE'
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Resolve cache-diff source run
      id: src
      shell: bash
      run: |
        TEST_PATH="${{ inputs.test_path }}"
        if [[ "$TEST_PATH" == CONSOLIDATE_FROM:* ]]; then
          RUN_ID="${TEST_PATH#CONSOLIDATE_FROM:}"
        else
          RUN_ID="${{ github.run_id }}"
        fi
        echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
        echo "pattern=cache-diff-${RUN_ID}-*" >> "$GITHUB_OUTPUT"
        echo "Using cache-diff artifacts from run $RUN_ID"

    - name: Restore existing consolidated cache
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    - name: Download cache diffs from matrix shards
      uses: actions/download-artifact@v4
      with:
        pattern: ${{ steps.src.outputs.pattern }}
        path: cache-artifacts
        merge-multiple: false
        repository: ${{ github.repository }}
        run-id: ${{ steps.src.outputs.run_id }}
        github-token: ${{ github.token }}

    - name: Consolidate .cache.ndjson
      run: |
        python3 .github/scripts/consolidate_cache.py --artifacts-dir cache-artifacts
        # actions/cache/save fails if the path is absent.
        touch .cache.ndjson
        echo "Consolidated entry count: $(grep -c . .cache.ndjson || true)"
        ls -lh .cache.ndjson

    - name: Store consolidated cache
      uses: actions/cache/save@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
