name: LLM Cache Refresh
run-name: LLM cache refresh ${{ inputs.test_path }}

on:
  workflow_dispatch:
    inputs:
      test_path:
        description: "Narrow test path to refresh/evaluate"
        required: true
        type: string
      parallel_run_args:
        description: "Extra parallel_run.sh args; do not set UNILLM_CACHE here"
        required: false
        type: string
        default: ""
      cache_mode:
        description: "write-misses refreshes cache; uncached-eval bypasses cache"
        required: true
        type: choice
        default: write-misses
        options:
        - write-misses
        - uncached-eval
      timeout_minutes:
        description: "Session timeout"
        required: false
        type: number
        default: 120
      confirm_llm_spend:
        description: "Type LLM_SPEND_OK to acknowledge this may call paid LLM APIs"
        required: true
        type: string
      confirm_full_matrix:
        description: "Type FULL_MATRIX_OK to allow test_path='.'"
        required: false
        type: string
        default: ""
      confirm_repeat:
        description: "Type REPEAT_OK to allow --repeat N where N > 1"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: llm-cache-refresh-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh LLM cache
    runs-on: ubuntu-latest-8-cores
    environment: droid-llm-cache-refresh
    timeout-minutes: 130
    env:
      UNIFY_TESTS_RAND_PROJ: "false"
      UNIFY_TESTS_DELETE_PROJ_ON_START: "false"
      UNIFY_TESTS_DELETE_PROJ_ON_EXIT: "false"
      UNILLM_CACHE: ${{ inputs.cache_mode == 'uncached-eval' && 'false' || 'true' }}
      ORCHESTRA_REPO_PATH: ${{ github.workspace }}/orchestra
      ORCHESTRA_URL: ${{ vars.ORCHESTRA_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_CI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_CI_API_KEY }}
      DROID_COMMS_URL: ${{ vars.DROID_COMMS_URL }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_LOCATION: ${{ vars.GCP_LOCATION }}
      ORCHESTRA_GCP_BUCKET_NAME: ${{ vars.GCP_BUCKET_LOGS }}
      ORCHESTRA_GCP_ASSISTANT_MEDIA_BUCKET_NAME: ${{ vars.GCP_BUCKET_ASSISTANT_IMAGES }}
      ORCHESTRA_GCP_ASSISTANT_CALL_RECORDINGS_BUCKET_NAME: ${{ vars.GCP_BUCKET_RECORDINGS }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      UNIFY_KEY: ${{ secrets.UNIFY_KEY }}
      PYTHONPATH: ${{ github.workspace }}/unillm:${{ github.workspace }}/unify
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Validate spend controls
      shell: bash
      run: |
        TEST_PATH="${{ inputs.test_path }}"
        EXTRA_ARGS="${{ inputs.parallel_run_args }}"

        fail() {
          echo "Refusing protected LLM run: $1" >&2
          exit 1
        }

        [[ "${{ inputs.confirm_llm_spend }}" == "LLM_SPEND_OK" ]] || fail "confirm_llm_spend must be LLM_SPEND_OK"
        [[ -n "$TEST_PATH" ]] || fail "test_path is required"
        if [[ "$TEST_PATH" == "." ]]; then
          [[ "${{ inputs.confirm_full_matrix }}" == "FULL_MATRIX_OK" ]] || fail "test_path='.' requires confirm_full_matrix=FULL_MATRIX_OK"
        fi
        read -ra ARG_TOKENS <<< "$EXTRA_ARGS"
        for i in "${!ARG_TOKENS[@]}"; do
          token="${ARG_TOKENS[$i]}"
          next="${ARG_TOKENS[$((i+1))]:-}"
          repeat_value=""
          if [[ "$token" == "--repeat" ]]; then
            repeat_value="$next"
          elif [[ "$token" == --repeat=* ]]; then
            repeat_value="${token#--repeat=}"
          fi
          if [[ "$repeat_value" =~ ^[0-9]+$ && "$repeat_value" -gt 1 ]]; then
            [[ "${{ inputs.confirm_repeat }}" == "REPEAT_OK" ]] || fail "--repeat N where N > 1 requires confirm_repeat=REPEAT_OK"
          fi
        done
        if [[ "$EXTRA_ARGS" == *"UNILLM_CACHE="* ]]; then
          fail "this workflow owns UNILLM_CACHE through cache_mode"
        fi

    - name: Clone orchestra repo for local deployment
      uses: actions/checkout@v4
      with:
        repository: unifyai/orchestra
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: orchestra
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Clone unify repo
      uses: actions/checkout@v4
      with:
        repository: unifyai/unify
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: unify
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Clone unillm repo
      uses: actions/checkout@v4
      with:
        repository: unifyai/unillm
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: unillm
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2.1.13
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f  # latest
      with:
        packages: >-
          tmux zsh portaudio19-dev libnss3-dev libatk-bridge2.0-dev libdrm2
          libxkbcommon0 libgtk-3-dev libgbm-dev libgirepository1.0-dev
          libasound2t64 libatspi2.0-0 libgtk-3-0 libnspr4 libwayland-client0
          libxcomposite1 libxdamage1 libxrandr2 xvfb
        version: 1.1

    - name: Install uv and poetry
      run: |
        pip install uv
        pip install poetry

    - name: Configure local package paths
      run: |
        sed -i 's|path = "../unify"|path = "./unify"|g' pyproject.toml
        sed -i 's|path = "../unillm"|path = "./unillm"|g' pyproject.toml

    - name: Sync dependencies with uv
      run: uv sync --all-groups

    - name: Install Playwright assets
      run: uv run playwright install --with-deps

    - name: Install orchestra dependencies
      run: |
        cd "$ORCHESTRA_REPO_PATH"
        poetry install --no-interaction

    - name: Restore existing consolidated cache
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    - name: Run protected LLM tests
      id: run-tests
      shell: bash
      run: |
        set +e
        TIMEOUT=$(( ${{ inputs.timeout_minutes }} * 60 ))
        TEST_PATH="${{ inputs.test_path }}"
        EXTRA_ARGS="${{ inputs.parallel_run_args }}"

        Xvfb :99 -screen 0 1920x1080x24 &
        XVFB_PID=$!
        export DISPLAY=:99
        trap "kill $XVFB_PID 2>/dev/null" EXIT

        echo "Running protected LLM workflow with UNILLM_CACHE=$UNILLM_CACHE"
        tests/parallel_run.sh --timeout "$TIMEOUT" $TEST_PATH $EXTRA_ARGS
        TEST_EXIT_CODE=$?
        echo "exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"
        exit $TEST_EXIT_CODE

    - name: Consolidate cache writes
      if: always() && inputs.cache_mode == 'write-misses'
      run: |
        mkdir -p cache-artifacts/current
        if [ -f .cache_write.ndjson ]; then
          cp .cache_write.ndjson cache-artifacts/current/.cache_write.ndjson
        fi
        python3 .github/scripts/consolidate_cache.py --artifacts-dir cache-artifacts

    - name: Store consolidated cache
      if: always() && inputs.cache_mode == 'write-misses'
      uses: actions/cache/save@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}

    - name: Upload cache diff
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: protected-cache-diff-${{ github.run_id }}
        path: .cache_write.ndjson
        if-no-files-found: ignore
        include-hidden-files: true
        retention-days: 7

    - name: Stop local orchestra
      if: always()
      continue-on-error: true
      run: orchestra/scripts/local.sh stop || true

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: protected-llm-test-logs-${{ github.run_id }}
        path: logs/
        if-no-files-found: ignore
        retention-days: 7
