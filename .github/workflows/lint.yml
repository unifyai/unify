name: Lint

permissions:
  contents: read

on:
  push:
    branches:
    - '**'

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Format check (locked black)
      run: |
        uv sync --only-group lint --no-install-project --frozen
        uv run --no-sync black --check .
