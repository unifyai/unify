name: Publish self-host images

on:
  push:
    branches: [staging, main]
    paths:
    - 'deploy/**'
    - 'unity/**'
    - 'pyproject.toml'
    - 'uv.lock'
    - '.github/workflows/ghcr-selfhost.yml'
  workflow_dispatch:

concurrency:
  group: ghcr-selfhost-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: unifyai/unity-selfhost

jobs:
  build:
    strategy:
      matrix:
        include:
        - platform: linux/amd64
          runner: ubuntu-latest
          arch_tag: amd64
        - platform: linux/arm64
          runner: ubuntu-24.04-arm
          arch_tag: arm64
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push platform slice
      uses: docker/build-push-action@v6
      with:
        context: .
        file: deploy/Dockerfile
        platforms: ${{ matrix.platform }}
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch_tag }}
        build-args: |
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          BRANCH=${{ github.ref_name == 'main' && 'main' || 'staging' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create multi-arch manifest
      run: |
        TAG="${{ github.ref_name == 'main' && 'main' || 'staging' }}"
        docker buildx imagetools create -t ghcr.io/unifyai/unity-selfhost:${TAG} \
          ghcr.io/unifyai/unity-selfhost:${{ github.sha }}-amd64 \
          ghcr.io/unifyai/unity-selfhost:${{ github.sha }}-arm64

  desktop:
    strategy:
      matrix:
        include:
        - platform: linux/amd64
          runner: ubuntu-latest
          arch_tag: amd64
        - platform: linux/arm64
          runner: ubuntu-24.04-arm
          arch_tag: arm64
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v6
      with:
        context: .
        file: deploy/selfhost/Dockerfile.desktop
        platforms: ${{ matrix.platform }}
        push: true
        tags: ghcr.io/unifyai/unity-desktop-selfhost:${{ github.sha }}-${{ matrix.arch_tag }}

  desktop-merge:
    needs: desktop
    runs-on: ubuntu-latest
    steps:
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - run: |
        TAG="${{ github.ref_name == 'main' && 'main' || 'staging' }}"
        docker buildx imagetools create -t ghcr.io/unifyai/unity-desktop-selfhost:${TAG} \
          ghcr.io/unifyai/unity-desktop-selfhost:${{ github.sha }}-amd64 \
          ghcr.io/unifyai/unity-desktop-selfhost:${{ github.sha }}-arm64
