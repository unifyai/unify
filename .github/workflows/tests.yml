name: Tests
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' &&
    github.event.inputs.test_path != '' &&
    format('Test {0}', github.event.inputs.test_path) ||
    github.event.head_commit.message ||
    github.event.pull_request.title
  }}

on:
  # Manual trigger - always runs tests
  workflow_dispatch:
    inputs:
      test_path:
        description: "test_path: paths to test"
        required: false
        type: string
        default: "."
      env_file_content:
        description: "env_file: paste .env contents (sensitive values masked)"
        required: false
        type: string
        default: ""
      parallel_run_args:
        description: "parallel_run_args: extra arguments (env args override env_file)"
        required: false
        type: string
        default: ""
      timeout_minutes:
        description: "timeout_minutes: session timeout"
        required: false
        type: number
        default: 120

  # Push events - tests only run if commit message contains [run-tests]
  push:
    branches:
    - '**'    # All branches

  # Pull request events - tests only run if PR title contains [run-tests]
  pull_request:
    branches:
    - '**'    # All branches

jobs:
  # Determine if tests should run based on trigger and commit/PR message
  should-run-tests:
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.check.outputs.run_tests }}
      parallel_run_cmd: ${{ steps.check.outputs.parallel_run_cmd }}
    steps:
    - name: Check if tests should run
      id: check
      env:
        # Pass these via env to avoid shell interpretation of special chars
        # (backticks, quotes, $() in commit messages would otherwise be executed)
        EVENT_NAME: ${{ github.event_name }}
        COMMIT_MSG: ${{ github.event.head_commit.message }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      run: |
        # Helper function to extract [parallel_run.sh ...] content
        # Matches ALL occurrences and combines their arguments
        extract_parallel_cmd() {
          local msg="$1"
          local result=""
          local remaining="$msg"

          # Loop through all matches of [parallel_run.sh ...]
          while [[ "$remaining" =~ \[parallel_run\.sh[[:space:]]+([^\]]+)\] ]]; do
            local match="${BASH_REMATCH[1]}"
            # Skip literal "..." which is just documentation/example text
            if [[ "$match" != "..." ]]; then
              if [[ -n "$result" ]]; then
                result="$result $match"
              else
                result="$match"
              fi
            fi
            # Remove the matched portion and continue searching
            remaining="${remaining#*"${BASH_REMATCH[0]}"}"
          done

          if [[ -n "$result" ]]; then
            echo "$result"
          fi
        }

        # workflow_dispatch always runs tests
        if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
          echo "run_tests=true" >> "$GITHUB_OUTPUT"
          echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
          echo "Tests triggered by workflow_dispatch"
          exit 0
        fi

        # For push events, check commit message
        if [[ "$EVENT_NAME" == "push" ]]; then
          # Check for [parallel_run.sh ...] first
          PARALLEL_CMD=$(extract_parallel_cmd "$COMMIT_MSG")
          if [[ -n "$PARALLEL_CMD" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=$PARALLEL_CMD" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by commit message: [parallel_run.sh $PARALLEL_CMD]"
            exit 0
          fi

          # Fall back to [run-tests]
          if [[ "$COMMIT_MSG" == *"[run-tests]"* ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by commit message containing [run-tests]"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Skipping tests - commit message does not contain [run-tests] or [parallel_run.sh ...]"
          fi
          exit 0
        fi

        # For pull_request events, check PR title
        if [[ "$EVENT_NAME" == "pull_request" ]]; then
          # Auto-run full suite for staging → main PRs (no tags required)
          if [[ "$PR_BASE_REF" == "main" && "$PR_HEAD_REF" == "staging" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Tests auto-triggered: staging → main PR"
            exit 0
          fi

          # Check for [parallel_run.sh ...] first
          PARALLEL_CMD=$(extract_parallel_cmd "$PR_TITLE")
          if [[ -n "$PARALLEL_CMD" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=$PARALLEL_CMD" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by PR title: [parallel_run.sh $PARALLEL_CMD]"
            exit 0
          fi

          # Fall back to [run-tests]
          if [[ "$PR_TITLE" == *"[run-tests]"* ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by PR title containing [run-tests]"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Skipping tests - PR title does not contain [run-tests] or [parallel_run.sh ...]"
          fi
          exit 0
        fi

        # Default: don't run tests
        echo "run_tests=false" >> "$GITHUB_OUTPUT"
        echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
        echo "Skipping tests - unknown event type"

  black:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install black
      run: pip install black

    - name: Run black check
      run: black --diff --color --check .

  discover:
    runs-on: ubuntu-latest
    needs: should-run-tests
    if: needs.should-run-tests.outputs.run_tests == 'true'
    outputs:
      test_dirs: ${{ steps.set-matrix.outputs.test_dirs }}
      parallel_run_args: ${{ steps.set-matrix.outputs.parallel_run_args }}
      job_timeout: ${{ steps.set-matrix.outputs.job_timeout }}
      # Project deletion flags (handled at workflow level to avoid race conditions)
      delete_on_start: ${{ steps.set-matrix.outputs.delete_on_start }}
      delete_on_exit: ${{ steps.set-matrix.outputs.delete_on_exit }}
      random_projects: ${{ steps.set-matrix.outputs.random_projects }}
      # Orchestra branch for local deployment
      orchestra_branch: ${{ steps.set-matrix.outputs.orchestra_branch }}
    steps:
    - uses: actions/checkout@v2

    - id: set-matrix
      shell: bash
      run: |
        # Parse test paths and flags, then create matrix entries for each path.
        # Each unique path gets its own parallel GitHub runner.
        #
        # Sources (priority order):
        # 1. [parallel_run.sh ...] from commit/PR → parse paths and flags
        # 2. workflow_dispatch inputs → test_path + parallel_run_args
        # 3. Default (no paths) → discover all leaf test folders
        #
        # ALL paths (explicit or discovered) are expanded to leaf directories:
        # - Files are kept as-is
        # - Directories are expanded to their leaf sub-folders
        #
        # Leaf discovery (Option A algorithm):
        # - Leaf directories (test files, no test subdirs) → one job per directory
        # - Mixed directories (test files AND test subdirs) → one bundled job for
        #   all direct test files (space-separated), plus recursive jobs for subdirs
        # This maximizes parallelism regardless of how paths are specified.

        PARALLEL_CMD="${{ needs.should-run-tests.outputs.parallel_run_cmd }}"
        INPUT_PATH="${{ inputs.test_path }}"
        INPUT_ARGS="${{ inputs.parallel_run_args }}"

        # Initialize
        declare -a RAW_PATHS=()
        declare -a PATHS=()
        declare -a FLAGS=()

        if [[ -n "$PARALLEL_CMD" ]]; then
          # Parse [parallel_run.sh ...] from commit/PR message
          # Separate flags (--env, --eval-only, etc.) from paths
          echo "Parsing [parallel_run.sh $PARALLEL_CMD]" >&2
          LAST_FLAG=""
          for token in $PARALLEL_CMD; do
            if [[ "$token" == --* ]]; then
              # It's a flag - collect it and its value if needed
              FLAGS+=("$token")
              LAST_FLAG="$token"
            elif [[ "$LAST_FLAG" == "--env" || "$LAST_FLAG" == "--tags" || "$LAST_FLAG" == "-j" || "$LAST_FLAG" == "--jobs" || "$LAST_FLAG" == "-t" || "$LAST_FLAG" == "--timeout" ]]; then
              # Previous token was a flag that takes a value
              FLAGS+=("$token")
              LAST_FLAG=""
            else
              # It's a path - collect for expansion
              RAW_PATHS+=("$token")
              LAST_FLAG=""
            fi
          done
        elif [[ -n "$INPUT_PATH" && "$INPUT_PATH" != "." ]]; then
          # workflow_dispatch with specific path(s)
          # Split space-separated paths into array
          read -ra RAW_PATHS <<< "$INPUT_PATH"
          # Flags come from parallel_run_args input
          if [[ -n "$INPUT_ARGS" ]]; then
            read -ra FLAGS <<< "$INPUT_ARGS"
          fi
          echo "Using test_path input: ${RAW_PATHS[*]}" >&2
        fi

        # Expand paths to leaf directories using discover_test_paths.py
        # - If RAW_PATHS is empty, discover all test paths from tests/
        # - If RAW_PATHS has entries, expand each directory to its leaf sub-folders
        # This ensures maximum parallelism regardless of how paths are specified.
        if (( ${#RAW_PATHS[@]} == 0 )); then
          # No explicit paths - discover all
          while IFS= read -r path; do
            PATHS+=("$path")
          done < <(python3 .github/scripts/discover_test_paths.py)
          # Flags come from parallel_run_args input (if any)
          if [[ -n "$INPUT_ARGS" ]]; then
            read -ra FLAGS <<< "$INPUT_ARGS"
          fi
          echo "Discovered ${#PATHS[@]} test paths (leaf dirs + individual files)" >&2
        else
          # Expand explicit paths to their leaf directories
          while IFS= read -r path; do
            PATHS+=("$path")
          done < <(python3 .github/scripts/discover_test_paths.py "${RAW_PATHS[@]}")
          echo "Expanded ${#RAW_PATHS[@]} path(s) to ${#PATHS[@]} leaf test paths" >&2
        fi

        # Build JSON array of paths for matrix
        if (( ${#PATHS[@]} == 0 )); then
          echo "Error: No test paths found" >&2
          exit 1
        fi

        json=$(printf '%s\n' "${PATHS[@]}" | python3 -c 'import sys,json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))')
        echo "test_dirs=$json" >> "$GITHUB_OUTPUT"
        echo "Matrix paths: $json" >&2

        # =====================================================================
        # Process project management flags with correct precedence:
        # 1. CI defaults (lowest priority)
        # 2. env_file_content (middle priority - can override defaults)
        # 3. parallel_run_args/FLAGS (highest priority - overrides everything)
        #
        # Note: env_file_content is base64-encoded and will be decoded/written
        # to .env in the pytest job. We only parse it here for project mgmt flags.
        # =====================================================================

        # CI defaults for project management (can be overridden)
        # With local orchestra (default), these are ignored - each job has fresh DB
        # Only relevant when ORCHESTRA_URL is set to a non-local URL (staging/production)
        DELETE_ON_START="false"  # Default: no deletion (local orchestra has fresh DB)
        DELETE_ON_EXIT="false"   # Default: keep project after tests
        RANDOM_PROJECTS="false"  # Default: shared project mode

        # Orchestra branch precedence (highest to lowest):
        # 1. --env LOCAL_ORCHESTRA_BRANCH=xxx (handled below in FLAGS parsing)
        # 2. env_file_content LOCAL_ORCHESTRA_BRANCH=xxx (handled below)
        # 3. Repository variable LOCAL_ORCHESTRA_BRANCH (if set)
        # 4. Auto-detect from unity branch (main→main, otherwise→staging)
        REPO_VAR_BRANCH="${{ vars.LOCAL_ORCHESTRA_BRANCH }}"
        if [[ -n "$REPO_VAR_BRANCH" ]]; then
          ORCHESTRA_BRANCH="$REPO_VAR_BRANCH"
          echo "Orchestra branch from repo variable: $ORCHESTRA_BRANCH" >&2
        else
          UNITY_BRANCH="${{ github.ref_name }}"
          if [[ "$UNITY_BRANCH" == "main" ]]; then
            ORCHESTRA_BRANCH="main"
          else
            ORCHESTRA_BRANCH="staging"
          fi
          echo "Orchestra branch auto-detected: $ORCHESTRA_BRANCH (unity on '$UNITY_BRANCH')" >&2
        fi

        # Parse env_file_content for project management flags only
        # (actual env vars are written to .env in pytest job, not passed as --env args)
        ENV_FILE_CONTENT_RAW="${{ inputs.env_file_content }}"
        if [[ -n "$ENV_FILE_CONTENT_RAW" ]]; then
          echo "Parsing env_file_content for project management flags..." >&2
          # Try to decode as base64; if it fails or produces garbage, assume raw content
          if DECODED=$(echo "$ENV_FILE_CONTENT_RAW" | base64 -d 2>/dev/null) && [[ "$DECODED" == *$'\n'* || "$DECODED" == *"="* ]]; then
            ENV_FILE_CONTENT="$DECODED"
          else
            ENV_FILE_CONTENT="$ENV_FILE_CONTENT_RAW"
          fi
          if [[ -n "$ENV_FILE_CONTENT" ]]; then
            while IFS= read -r line || [[ -n "$line" ]]; do
              # Skip empty lines and comments
              [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue

              # Extract KEY=VALUE (handles quotes)
              if [[ "$line" =~ ^[[:space:]]*([A-Za-z_][A-Za-z0-9_]*)[[:space:]]*=[[:space:]]*(.*)[[:space:]]*$ ]]; then
                key="${BASH_REMATCH[1]}"
                value="${BASH_REMATCH[2]}"

                # Strip surrounding quotes if present
                if [[ "$value" =~ ^\"(.*)\"$ ]] || [[ "$value" =~ ^\'(.*)\'$ ]]; then
                  value="${BASH_REMATCH[1]}"
                fi

                # Only check for project management flags (other vars handled via .env file)
                case "$key=$value" in
                  UNIFY_TESTS_DELETE_PROJ_ON_START=true|UNIFY_TESTS_DELETE_PROJ_ON_START=True|UNIFY_TESTS_DELETE_PROJ_ON_START=1)
                    DELETE_ON_START="true"
                    echo "  env_file: DELETE_ON_START=true" >&2
                    ;;
                  UNIFY_TESTS_DELETE_PROJ_ON_START=false|UNIFY_TESTS_DELETE_PROJ_ON_START=False|UNIFY_TESTS_DELETE_PROJ_ON_START=0)
                    DELETE_ON_START="false"
                    echo "  env_file: DELETE_ON_START=false" >&2
                    ;;
                  UNIFY_TESTS_DELETE_PROJ_ON_EXIT=true|UNIFY_TESTS_DELETE_PROJ_ON_EXIT=True|UNIFY_TESTS_DELETE_PROJ_ON_EXIT=1)
                    DELETE_ON_EXIT="true"
                    echo "  env_file: DELETE_ON_EXIT=true" >&2
                    ;;
                  UNIFY_TESTS_DELETE_PROJ_ON_EXIT=false|UNIFY_TESTS_DELETE_PROJ_ON_EXIT=False|UNIFY_TESTS_DELETE_PROJ_ON_EXIT=0)
                    DELETE_ON_EXIT="false"
                    echo "  env_file: DELETE_ON_EXIT=false" >&2
                    ;;
                  UNIFY_TESTS_RAND_PROJ=true|UNIFY_TESTS_RAND_PROJ=True|UNIFY_TESTS_RAND_PROJ=1)
                    RANDOM_PROJECTS="true"
                    echo "  env_file: RANDOM_PROJECTS=true" >&2
                    ;;
                  UNIFY_TESTS_RAND_PROJ=false|UNIFY_TESTS_RAND_PROJ=False|UNIFY_TESTS_RAND_PROJ=0)
                    RANDOM_PROJECTS="false"
                    echo "  env_file: RANDOM_PROJECTS=false" >&2
                    ;;
                  LOCAL_ORCHESTRA_BRANCH=*)
                    ORCHESTRA_BRANCH="$value"
                    echo "  env_file: ORCHESTRA_BRANCH=$value" >&2
                    ;;
                esac
              fi
            done <<< "$ENV_FILE_CONTENT"
          fi
        fi

        # Process FLAGS (from parallel_run_args) - highest priority
        # These are explicit --env args passed via commit message or workflow dispatch
        declare -a CLEANED_FLAGS=()
        skip_next=false

        for i in "${!FLAGS[@]}"; do
          if $skip_next; then
            skip_next=false
            continue
          fi

          flag="${FLAGS[$i]}"
          next_val="${FLAGS[$((i+1))]:-}"

          # Check for --env with project management flags (strip them, handle at workflow level)
          if [[ "$flag" == "--env" ]]; then
            case "$next_val" in
              UNIFY_TESTS_DELETE_PROJ_ON_START=true|UNIFY_TESTS_DELETE_PROJ_ON_START=True|UNIFY_TESTS_DELETE_PROJ_ON_START=1)
                DELETE_ON_START="true"
                skip_next=true
                echo "  args: DELETE_ON_START=true (override)" >&2
                continue
                ;;
              UNIFY_TESTS_DELETE_PROJ_ON_START=false|UNIFY_TESTS_DELETE_PROJ_ON_START=False|UNIFY_TESTS_DELETE_PROJ_ON_START=0)
                DELETE_ON_START="false"
                skip_next=true
                echo "  args: DELETE_ON_START=false (override)" >&2
                continue
                ;;
              UNIFY_TESTS_DELETE_PROJ_ON_EXIT=true|UNIFY_TESTS_DELETE_PROJ_ON_EXIT=True|UNIFY_TESTS_DELETE_PROJ_ON_EXIT=1)
                DELETE_ON_EXIT="true"
                skip_next=true
                echo "  args: DELETE_ON_EXIT=true (override)" >&2
                continue
                ;;
              UNIFY_TESTS_DELETE_PROJ_ON_EXIT=false|UNIFY_TESTS_DELETE_PROJ_ON_EXIT=False|UNIFY_TESTS_DELETE_PROJ_ON_EXIT=0)
                DELETE_ON_EXIT="false"
                skip_next=true
                echo "  args: DELETE_ON_EXIT=false (override)" >&2
                continue
                ;;
              UNIFY_TESTS_RAND_PROJ=true|UNIFY_TESTS_RAND_PROJ=True|UNIFY_TESTS_RAND_PROJ=1)
                RANDOM_PROJECTS="true"
                CLEANED_FLAGS+=("$flag" "$next_val")  # Keep for runners
                skip_next=true
                echo "  args: RANDOM_PROJECTS=true (override)" >&2
                continue
                ;;
              UNIFY_TESTS_RAND_PROJ=false|UNIFY_TESTS_RAND_PROJ=False|UNIFY_TESTS_RAND_PROJ=0)
                RANDOM_PROJECTS="false"
                skip_next=true
                echo "  args: RANDOM_PROJECTS=false (override)" >&2
                continue
                ;;
              LOCAL_ORCHESTRA_BRANCH=*)
                ORCHESTRA_BRANCH="${next_val#LOCAL_ORCHESTRA_BRANCH=}"
                skip_next=true
                echo "  args: ORCHESTRA_BRANCH=${ORCHESTRA_BRANCH} (override)" >&2
                continue
                ;;
            esac
          fi

          CLEANED_FLAGS+=("$flag")
        done

        echo "" >&2
        echo "Final settings:" >&2
        echo "  DELETE_ON_START=$DELETE_ON_START" >&2
        echo "  DELETE_ON_EXIT=$DELETE_ON_EXIT" >&2
        echo "  RANDOM_PROJECTS=$RANDOM_PROJECTS" >&2

        echo "delete_on_start=$DELETE_ON_START" >> "$GITHUB_OUTPUT"
        echo "delete_on_exit=$DELETE_ON_EXIT" >> "$GITHUB_OUTPUT"
        echo "random_projects=$RANDOM_PROJECTS" >> "$GITHUB_OUTPUT"
        echo "orchestra_branch=$ORCHESTRA_BRANCH" >> "$GITHUB_OUTPUT"

        # Build parallel_run_args from explicit flags only (not env_file content)
        # env_file content is handled separately by writing to .env on the runner
        if (( ${#CLEANED_FLAGS[@]} > 0 )); then
          flags_str="${CLEANED_FLAGS[*]}"
          echo "parallel_run_args=$flags_str" >> "$GITHUB_OUTPUT"
          echo "Explicit args: $flags_str" >&2
        else
          echo "parallel_run_args=" >> "$GITHUB_OUTPUT"
        fi

        # Compute job timeout (test timeout + 10 min buffer)
        BASE_TIMEOUT="${{ inputs.timeout_minutes }}"
        if [[ -z "$BASE_TIMEOUT" || "$BASE_TIMEOUT" == "null" ]]; then
          BASE_TIMEOUT=120
        fi
        JOB_TIMEOUT=$((BASE_TIMEOUT + 10))
        echo "job_timeout=$JOB_TIMEOUT" >> "$GITHUB_OUTPUT"

  # Setup job: runs ONCE before all pytest jobs (if delete_on_start is true)
  # Handles project deletion at workflow level to avoid race conditions
  setup:
    name: Setup
    runs-on: ubuntu-latest
    needs: [should-run-tests, discover]
    # Only run if DELETE_ON_START is requested AND we're in shared project mode
    if: |
      needs.should-run-tests.outputs.run_tests == 'true' &&
      needs.discover.outputs.delete_on_start == 'true' &&
      needs.discover.outputs.random_projects != 'true'
    env:
      UNIFY_KEY: ${{ secrets.UNIFY_KEY }}
      # No fallback - if delete_on_start is enabled, ORCHESTRA_URL must be set
      ORCHESTRA_URL: ${{ vars.ORCHESTRA_URL }}
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install unify client
      run: pip install unify

    - name: Delete shared project (once, before all runners)
      run: |
        echo "Deleting shared project before tests start..."
        python3 << 'PYEOF'
        import os
        import unify

        project_name = os.environ.get("UNIFY_PROJECT", "UnityTests")
        try:
            unify.delete_project(project_name)
            print(f"✓ Deleted project '{project_name}'")
        except Exception as e:
            print(f"Note: Could not delete project '{project_name}': {e}")
            print("(Project may not exist yet - this is OK)")
        PYEOF

  pytest:
    name: pytest (${{ matrix.test_path }})
    runs-on: ubuntu-latest-8-cores
    environment: unity-testing
    # Fixed timeout - dynamic timeout from needs.discover.outputs caused silent job creation failure
    timeout-minutes: 130
    # Depend on setup job (it may be skipped, but that's OK - GitHub handles this)
    needs: [should-run-tests, discover, setup]
    if: |
      always() &&
      needs.should-run-tests.outputs.run_tests == 'true' &&
      (needs.setup.result == 'success' || needs.setup.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        test_path: ${{ fromJSON(needs.discover.outputs.test_dirs) }}
    env:
      # CI project management defaults (explicit, not relying on code defaults)
      UNIFY_TESTS_RAND_PROJ: "false"              # Shared project mode
      UNIFY_TESTS_DELETE_PROJ_ON_START: "false"   # Handled by setup job at workflow level
      UNIFY_TESTS_DELETE_PROJ_ON_EXIT: "false"    # Keep project after tests
      # Local orchestra path (cloned into workspace, not sibling directory)
      ORCHESTRA_REPO_PATH: ${{ github.workspace }}/orchestra
      # API credentials
      # ORCHESTRA_URL: if repo variable set, use remote; otherwise local orchestra sets it
      ORCHESTRA_URL: ${{ vars.ORCHESTRA_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Communication service URL (auto-selected based on branch: main→production, else→staging)
      UNITY_COMMS_URL: ${{ github.ref_name == 'main' && 'https://unity-comms-app-262420637606.us-central1.run.app' || 'https://unity-comms-app-staging-262420637606.us-central1.run.app' }}
      # Orchestra GCP configuration (set by google-github-actions/auth step)
      # GOOGLE_APPLICATION_CREDENTIALS is set automatically by the google-github-actions/auth action
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_LOCATION: ${{ vars.GCP_LOCATION }}
      # GCP bucket names (passed to orchestra server)
      ORCHESTRA_GCP_BUCKET_NAME: ${{ vars.GCP_BUCKET_LOGS }}
      ORCHESTRA_GCP_ASSISTANT_IMAGES_BUCKET_NAME: ${{ vars.GCP_BUCKET_ASSISTANT_IMAGES }}
      ORCHESTRA_GCP_ASSISTANT_RECORDINGS_BUCKET_NAME: ${{ vars.GCP_BUCKET_RECORDINGS }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      # Unify API key for _prepare_shared_project.py and tests
      UNIFY_KEY: ${{ secrets.UNIFY_KEY }}
      # Ensure local unillm/unify packages are found correctly
      # The repos are cloned to ./unillm/ and ./unify/, with packages inside
      PYTHONPATH: ${{ github.workspace }}/unillm:${{ github.workspace }}/unify
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 1

    - name: Clone orchestra repo for local deployment
      uses: actions/checkout@v2
      with:
        repository: unifyai/orchestra
        ref: ${{ needs.discover.outputs.orchestra_branch }}
        path: orchestra
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Clone unify repo
      uses: actions/checkout@v2
      with:
        repository: unifyai/unify
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: unify
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Clone unillm repo
      uses: actions/checkout@v2
      with:
        repository: unifyai/unillm
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: unillm
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

    - name: Get orchestra commit SHA
      id: orchestra-sha
      run: echo "sha=$(git -C orchestra rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Setup environment from env_file_content
      if: inputs.env_file_content != ''
      run: |
        # Write env_file_content to .env, handling both base64-encoded and raw formats
        # - parallel_cloud_run.sh sends base64-encoded content
        # - Manual UI paste can be raw .env content (more convenient)
        CONTENT="${{ inputs.env_file_content }}"

        # Try to decode as base64; if it fails or produces binary garbage, assume raw content
        if DECODED=$(echo "$CONTENT" | base64 -d 2>/dev/null) && [[ "$DECODED" == *$'\n'* || "$DECODED" == *"="* ]]; then
          echo "$DECODED" > .env
          echo "✓ Decoded base64 env_file_content"
        else
          echo "$CONTENT" > .env
          echo "✓ Using raw env_file_content"
        fi

        # Mask values for sensitive variable names (these patterns catch most secrets)
        # Sensitive patterns: *_KEY, *_SECRET, *_PASSWORD, *_TOKEN, *_CREDENTIAL*, *_API_*
        while IFS= read -r line || [[ -n "$line" ]]; do
          # Skip empty lines and comments
          [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue

          # Extract KEY=VALUE
          if [[ "$line" =~ ^[[:space:]]*([A-Za-z_][A-Za-z0-9_]*)[[:space:]]*=[[:space:]]*(.*)[[:space:]]*$ ]]; then
            key="${BASH_REMATCH[1]}"
            value="${BASH_REMATCH[2]}"

            # Strip surrounding quotes if present
            if [[ "$value" =~ ^\"(.*)\"$ ]] || [[ "$value" =~ ^\'(.*)\'$ ]]; then
              value="${BASH_REMATCH[1]}"
            fi

            # Skip empty values
            [[ -z "$value" ]] && continue

            # Mask if key matches sensitive patterns
            key_upper="${key^^}"
            if [[ "$key_upper" == *_KEY || "$key_upper" == *_SECRET || \
                  "$key_upper" == *_PASSWORD || "$key_upper" == *_TOKEN || \
                  "$key_upper" == *_CREDENTIAL* || "$key_upper" == *_API_* || \
                  "$key_upper" == *APIKEY* ]]; then
              echo "::add-mask::$value"
              echo "Masked: $key"
            fi
          fi
        done < .env

        echo "✓ Environment file written to .env (sensitive values masked)"

    - name: Normalize test path
      id: normalize-path
      run: |
        # Each matrix entry is either a single test path or a space-separated
        # bundle of files (from mixed directories with both files and subdirs)
        RAW_PATH='${{ matrix.test_path }}'
        echo "test_args=$RAW_PATH" >> $GITHUB_OUTPUT

        # Normalize for artifact naming and display
        if [[ "$RAW_PATH" == *" "* ]]; then
          # Bundled multi-file entry: derive name from common parent directory
          first_file="${RAW_PATH%% *}"
          parent_dir=$(dirname "$first_file")
          file_count=$(echo "$RAW_PATH" | wc -w | tr -d ' ')
          normalized=$(echo "$parent_dir" | sed 's|^tests/||' | tr '/' '_')
          normalized="${normalized}_${file_count}_files"
          display_name="${parent_dir} (${file_count} files)"
        else
          normalized=$(echo "$RAW_PATH" | sed 's|^tests/||' | tr '/' '_')
          display_name="$RAW_PATH"
        fi

        if [[ -z "$normalized" || "$normalized" == "." ]]; then normalized="all"; fi
        echo "test_path_normalized=$normalized" >> $GITHUB_OUTPUT
        echo "display_name=$display_name" >> $GITHUB_OUTPUT

        # Calculate timeout in seconds (default 120 minutes)
        TIMEOUT_MINS="${{ inputs.timeout_minutes }}"
        if [[ -z "$TIMEOUT_MINS" || "$TIMEOUT_MINS" == "null" ]]; then
          TIMEOUT_MINS=120
        fi
        echo "timeout_seconds=$((TIMEOUT_MINS * 60))" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    # Cache apt packages to avoid re-downloading 170+ packages on every run
    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: >-
          tmux zsh portaudio19-dev libnss3-dev libatk-bridge2.0-dev libdrm2
          libxkbcommon0 libgtk-3-dev libgbm-dev libgirepository1.0-dev
          libasound2t64 libatspi2.0-0 libgtk-3-0 libnspr4 libwayland-client0
          libxcomposite1 libxdamage1 libxrandr2 xvfb
        version: 1.1

    - name: Install uv and poetry
      run: |
        pip install uv
        pip install poetry

    # Cache uv dependencies to avoid re-downloading on every run
    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        # Include unillm and unify pyproject.toml to bust cache when dependencies change
        key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock', 'unillm/pyproject.toml', 'unify/pyproject.toml') }}
        restore-keys: |
          uv-${{ runner.os }}-

    - name: Configure unify/unillm paths for CI
      run: |
        # Local development uses sibling paths (../unify, ../unillm).
        # CI clones these repos into the workspace, so update paths accordingly.
        sed -i 's|path = "../unify"|path = "./unify"|g' pyproject.toml
        sed -i 's|path = "../unillm"|path = "./unillm"|g' pyproject.toml
        # unillm's pyproject.toml has path = "../unify" which correctly resolves to ./unify/ from ./unillm/

    - name: Sync dependencies with uv
      run: |
        # Install project and dev dependencies from pyproject.toml
        uv sync --all-groups

    - name: Verify local packages installed correctly
      run: |
        # Ensure we got the LOCAL unillm/unify, not PyPI packages with the same name
        # The local unillm exports AsyncUnify; the PyPI one exports UniLLM
        # PYTHONPATH is set at job level to include ./unillm and ./unify
        uv run python -c "
        import sys
        print('Python path (first 5):')
        for p in sys.path[:5]:
            print(f'  {p}')

        from unillm import AsyncUnify, Unify
        import unify

        print(f'✓ unillm: {AsyncUnify.__module__}')
        print(f'✓ unify: {unify.__file__}')
        assert hasattr(unify, 'create_project'), f'Wrong unify package!'
        print('✓ Local packages verified successfully')
        "

    # Cache Playwright assets (~500MB) to avoid re-downloading on every run
    - name: Cache Playwright assets
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright assets
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        uv run playwright install --with-deps

    - name: Restore .cache.ndjson
      id: cache-read
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    # Cache orchestra's poetry dependencies keyed on orchestra's commit SHA
    - name: Cache orchestra poetry dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pypoetry
        key: poetry-orchestra-${{ runner.os }}-${{ steps.orchestra-sha.outputs.sha }}
        restore-keys: |
          poetry-orchestra-${{ runner.os }}-

    - name: Install orchestra dependencies
      run: |
        # Install orchestra dependencies so parallel_run.sh can start it
        # (parallel_run.sh handles the full orchestra lifecycle)
        cd "$ORCHESTRA_REPO_PATH"
        poetry install --no-interaction

    - name: Run tests
      id: run-tests
      run: |
        set +e

        # parallel_run_args comes from discover job (parsed from commit message or inputs)
        EXTRA_ARGS="${{ needs.discover.outputs.parallel_run_args }}"
        TEST_PATH="${{ steps.normalize-path.outputs.test_args }}"
        TIMEOUT="${{ steps.normalize-path.outputs.timeout_seconds }}"

        # Start Xvfb manually instead of using xvfb-run.
        # xvfb-run doesn't propagate signals to child processes, making
        # workflow cancellation ineffective. This approach ensures SIGTERM
        # reaches parallel_run.sh directly.
        Xvfb :99 -screen 0 1920x1080x24 &
        XVFB_PID=$!
        export DISPLAY=:99

        # Ensure Xvfb is cleaned up on exit
        trap "kill $XVFB_PID 2>/dev/null" EXIT

        # parallel_run.sh handles starting local orchestra automatically
        # Note: TEST_PATH must come before EXTRA_ARGS because EXTRA_ARGS may contain
        # "-- pytest-args" and everything after -- is treated as pytest arguments
        # TEST_PATH is unquoted to allow word splitting for bundled multi-file entries
        echo "Running: parallel_run.sh --timeout $TIMEOUT $TEST_PATH $EXTRA_ARGS"
        tests/parallel_run.sh --timeout "$TIMEOUT" $TEST_PATH $EXTRA_ARGS
        TEST_EXIT_CODE=$?
        echo "exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"
        exit $TEST_EXIT_CODE

    - name: Dump orchestra logs on failure
      if: failure()
      run: |
        echo "=== Orchestra Server Logs ==="
        if [ -f /tmp/orchestra-local-server.log ]; then
          cat /tmp/orchestra-local-server.log
          # Also copy to logs/orchestra/ so it gets uploaded with artifacts
          if [ -d logs/orchestra ]; then
            # Find the session directory (most recent timestamp)
            session_dir=$(ls -td logs/orchestra/*/ 2>/dev/null | head -1)
            if [ -n "$session_dir" ]; then
              cp /tmp/orchestra-local-server.log "$session_dir/server.log"
              echo "(Copied to $session_dir/server.log for artifact upload)"
            fi
          fi
        else
          echo "No orchestra log file found at /tmp/orchestra-local-server.log"
        fi
        echo ""
        echo "=== Orchestra Server Process Status ==="
        if [ -f /tmp/orchestra-local-server.pid ]; then
          PID=$(cat /tmp/orchestra-local-server.pid)
          echo "Expected PID: $PID"
          if ps -p "$PID" > /dev/null 2>&1; then
            echo "Process is still running"
          else
            echo "Process is NOT running"
          fi
        else
          echo "No PID file found"
        fi
        echo ""
        echo "=== Any orchestra-related processes ==="
        ps aux | grep -E "(orchestra|uvicorn)" | grep -v grep || echo "None found"

    - name: Generate failure summary
      if: failure()
      run: |
        ARTIFACTS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"

        # Count total tests from log files (robust - doesn't depend on tmux session timing)
        TOTAL_COUNT=0
        if [ -d "logs/pytest" ]; then
          TOTAL_COUNT=$(find logs/pytest -name "*.txt" -type f 2>/dev/null | wc -l | tr -d ' ')
        fi

        # Get failed sessions from tmux (these persist, unlike passing sessions which auto-close)
        FAILED_SESSIONS=""
        FAIL_COUNT=0
        for sock in /tmp/tmux-$(id -u)/unity*; do
          if [ -S "$sock" ]; then
            socket_name=$(basename "$sock")
            FAILED_SESSIONS=$(tmux -L "$socket_name" ls 2>/dev/null | sed 's/: .*//' | grep '^f ' || true)
            FAIL_COUNT=$(echo "$FAILED_SESSIONS" | grep -c '^f ' || echo 0)
            break
          fi
        done

        # Infer passes from total - failures (robust to timing of session auto-close)
        PASS_COUNT=$((TOTAL_COUNT - FAIL_COUNT))

        # Echo to step output (foldable view)
        echo "=== Test Results ==="
        echo "✅ $PASS_COUNT passed, ❌ $FAIL_COUNT failed"
        echo ""
        echo "Failed tests:"
        echo "$FAILED_SESSIONS"
        echo ""
        echo "Download logs: $ARTIFACTS_URL"

        # Write to GitHub Summary page
        echo "## ❌ Test Failures: \`${{ steps.normalize-path.outputs.display_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**✅ $PASS_COUNT** passed, **❌ $FAIL_COUNT** failed — [view logs]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Failed tests:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "$FAILED_SESSIONS" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

        # Include duration and cache summary if available
        DURATION_FILE=$(find logs/pytest -name "duration_summary.txt" 2>/dev/null | head -1)
        if [ -n "$DURATION_FILE" ] && [ -f "$DURATION_FILE" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📊 Test Stats: Duration & Cache (fastest → slowest)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat "$DURATION_FILE" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Generate success summary
      if: success()
      run: |
        ARTIFACTS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"

        # Count test files
        log_count=0
        if [ -d "logs/pytest" ]; then
          log_count=$(find logs/pytest -name "*.txt" -type f 2>/dev/null | wc -l | tr -d ' ')
        fi

        # Fail if no tests ran - this indicates a problem (path resolution, collection error, etc.)
        if [ "$log_count" -eq 0 ]; then
          echo "## ⚠️ No Tests Ran: \`${{ steps.normalize-path.outputs.display_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**0 tests executed** — this likely indicates a problem with test discovery." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the 'Run tests' step logs for details." >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "Error: No tests were executed. This indicates a problem with test discovery." >&2
          echo "Check the 'Run tests' step output for pytest collection errors." >&2
          exit 1
        fi

        # Echo to step output (foldable view)
        echo "=== All tests passed ==="
        echo "✅ $log_count passed"
        echo ""
        echo "View logs: $ARTIFACTS_URL"

        # Write to GitHub Summary page
        echo "## ✅ All Tests Passed: \`${{ steps.normalize-path.outputs.display_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**✅ $log_count** passed — [view logs]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY

        # Include duration and cache summary if available
        DURATION_FILE=$(find logs/pytest -name "duration_summary.txt" 2>/dev/null | head -1)
        if [ -n "$DURATION_FILE" ] && [ -f "$DURATION_FILE" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📊 Test Stats: Duration & Cache (fastest → slowest)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat "$DURATION_FILE" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        fi

    # =========================================================================
    # Artifact uploads - run BEFORE cleanup to ensure logs are always available
    # Even if cleanup fails, we want the debugging artifacts uploaded
    # =========================================================================
    - name: Upload cache artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cache-diff-${{ github.run_id }}-${{ steps.normalize-path.outputs.test_path_normalized }}
        path: .cache_write.ndjson
        if-no-files-found: ignore
        include-hidden-files: true
        retention-days: 1

    # =========================================================================
    # Stop orchestra BEFORE log upload to ensure all PENDING trace files are
    # finalized. Orchestra writes in-flight requests as *_PENDING_*.json and
    # renames them on completion. If orchestra is still running during upload,
    # the glob may find PENDING files that get renamed before upload reads them.
    # =========================================================================
    - name: Stop local orchestra (before log upload)
      if: always()
      continue-on-error: true  # Cleanup failures shouldn't affect job status
      run: |
        trap 'echo "Received SIGTERM, exiting gracefully"; exit 0' TERM
        orchestra/scripts/local.sh stop || true

    - name: Prepare logs for upload
      if: always()
      run: |
        # Prepare each log subfolder independently with isolated error handling.
        # If one log type has issues, others should still be uploadable.
        # The logs/ directory mirrors the artifact structure: pytest, llm, orchestra.

        echo "=== Preparing logs for upload ==="

        # Ensure logs directory exists (even if empty, artifact upload handles this)
        mkdir -p logs

        # --- pytest logs ---
        if [ -d logs/pytest ]; then
          file_count=$(find logs/pytest -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "✓ pytest logs: $file_count files"
        else
          echo "○ pytest logs: directory not found (skipping)"
        fi

        # --- Unillm logs ---
        if [ -d logs/unillm ]; then
          file_count=$(find logs/unillm -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "✓ unillm logs: $file_count files"
        else
          echo "○ unillm logs: directory not found (skipping)"
        fi

        # --- Orchestra logs (requires filename sanitization) ---
        if [ -d logs/orchestra ]; then
          # Orchestra trace filenames include route paths which may contain colons
          # (e.g., project_name:path). Colons are invalid in Windows NTFS, so
          # GitHub Actions rejects them. Replace invalid characters with underscores.
          sanitized=0
          while IFS= read -r -d '' file; do
            newname=$(echo "$file" | tr ':' '_')
            if mv "$file" "$newname" 2>/dev/null; then
              ((sanitized++)) || true
            fi
          done < <(find logs/orchestra -type f -name '*:*' -print0 2>/dev/null || true)

          file_count=$(find logs/orchestra -type f 2>/dev/null | wc -l | tr -d ' ')
          if [ "$sanitized" -gt 0 ]; then
            echo "✓ orchestra logs: $file_count files ($sanitized filenames sanitized)"
          else
            echo "✓ orchestra logs: $file_count files"
          fi
        else
          echo "○ orchestra logs: directory not found (skipping)"
        fi

        echo "=== Log preparation complete ==="

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ steps.normalize-path.outputs.test_path_normalized }}
        path: logs/
        if-no-files-found: ignore
        retention-days: 90

    # =========================================================================
    # Cleanup steps - run AFTER artifact uploads
    # Note: Orchestra is stopped BEFORE log upload (see above) to ensure
    # PENDING trace files are finalized. This section handles tmux cleanup.
    # =========================================================================
    - name: Cleanup on cancellation
      if: cancelled()
      run: |
        echo "Workflow cancelled - cleaning up tmux sessions and orphaned processes..."
        # Kill all unity tmux servers and purge orphaned test processes
        tests/kill_server.sh --all || true
        # Orchestra already stopped before log upload, but ensure it's down
        orchestra/scripts/local.sh stop || true
        echo "Cleanup complete."

  # Cleanup job: runs ONCE after all pytest jobs complete or are cancelled
  # Handles project deletion at workflow level to avoid race conditions
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [should-run-tests, discover, pytest]
    # Run if: (delete_on_exit requested in shared mode) OR (any job was cancelled)
    # Cancelled runs likely left partial test data that should be cleaned up
    if: |
      always() &&
      needs.should-run-tests.outputs.run_tests == 'true' &&
      needs.discover.outputs.random_projects != 'true' &&
      (needs.discover.outputs.delete_on_exit == 'true' || needs.pytest.result == 'cancelled')
    env:
      UNIFY_KEY: ${{ secrets.UNIFY_KEY }}
      # No fallback - if delete_on_exit is enabled, ORCHESTRA_URL must be set
      ORCHESTRA_URL: ${{ vars.ORCHESTRA_URL }}
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install unify client
      run: pip install unify

    - name: Delete shared project (once, after all runners)
      run: |
        echo "Deleting shared project after all tests complete..."
        python3 << 'PYEOF'
        import os
        import unify

        project_name = os.environ.get("UNIFY_PROJECT", "UnityTests")
        try:
            unify.delete_project(project_name)
            print(f"✓ Deleted project '{project_name}'")
        except Exception as e:
            print(f"Note: Could not delete project '{project_name}': {e}")
        PYEOF

  cache-consolidation:
    name: Consolidate and store cache
    runs-on: ubuntu-latest
    needs: [should-run-tests, pytest, cleanup]
    if: always() && needs.should-run-tests.outputs.run_tests == 'true'
    steps:
    - uses: actions/checkout@v2

    - name: Restore existing consolidated cache
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    - name: Download cache artifacts from current run
      uses: actions/download-artifact@v4
      with:
        pattern: cache-diff-*
        path: cache-artifacts

    - name: Consolidate .cache.ndjson files
      run: |
        python3 .github/scripts/consolidate_cache.py \
          --artifacts-dir cache-artifacts

    - name: Store consolidated cache
      uses: actions/cache/save@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
