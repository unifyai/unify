name: Testing unify

on: push

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install --with dev
    - name: Run black check
      run: poetry run black --check .

  pytest:
    runs-on: ubuntu-latest
    environment: unify-testing
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install --with dev
    - name: Run unit tests
      run: poetry run pytest --timeout=120 -p no:warnings -vv .
      env:
        UNIFY_KEY: ${{ secrets.UNIFY_API_KEY }}
