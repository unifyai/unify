name: Testing Unity with uv
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' &&
    github.event.inputs.test_path != '' &&
    format('Test {0}', github.event.inputs.test_path) ||
    github.event.head_commit.message
  }}

on:
  push:
  workflow_dispatch:
    inputs:
      test_path:
        description: "Path to test file or directory to run"
        required: false
        type: string
        default: "."
      test_enable_cli_logging:
        description: "Enable CLI logging"
        required: false
        type: boolean
        default: false
      test_cli_log_level:
        description: "CLI log level"
        required: false
        default: "ERROR"
        type: choice
        options:
        - CRITICAL
        - ERROR
        - WARNING
        - INFO
        - DEBUG
      test_log_file_level:
        description: "Log file level"
        required: false
        default: "INFO"
        type: choice
        options:
        - CRITICAL
        - ERROR
        - WARNING
        - INFO
        - DEBUG
      test_show_slowest:
        description: "Number of slowest tests to show"
        required: false
        type: number
        default: 20
      test_timeout:
        description: "Per-test timeout in seconds"
        required: false
        type: number
        default: 120
      test_session_timeout:
        description: "Test session timeout in minutes (for all tests)"
        required: false
        type: number
        default: 180
      runner_timeout:
        description: "Runner timeout in minutes"
        required: false
        type: number
        default: 190

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Install black
      run: pip install black

    - name: Run black check
      run: black --diff --color --check .

  pytest:
    runs-on: ubuntu-latest
    environment: unity-testing
    timeout-minutes: ${{ github.event_name == 'workflow_dispatch' && fromJSON(inputs.runner_timeout) || 190 }}
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y portaudio19-dev libnss3-dev libatk-bridge2.0-dev libdrm2 libxkbcommon0 libgtk-3-dev libgbm-dev libgirepository1.0-dev
        # Install Playwright system dependencies for Ubuntu
        sudo apt-get install -y libasound2t64 libatspi2.0-0 libdrm2 libgtk-3-0 libnspr4 libnss3 libwayland-client0 libxcomposite1 libxdamage1 libxrandr2 xvfb

    - name: Install uv
      run: pip install uv

    - name: Create virtualenv and install deps
      run: |
        uv venv --python 3.11 .unity
        source .unity/bin/activate

        # 1) Create filtered requirements file
        grep -vE '^\s*-e\s+\.\./unify' requirements.txt > temp_requirements.txt

        # 2) Install all dependencies
        uv pip install -r temp_requirements.txt

        # 3) Install playwright browsers WITH system dependencies
        .unity/bin/python -m playwright install --with-deps

        # 4) Install the local 'unity' project in editable mode
        uv pip install -e .

        # 5) Install unify package from GitHub
        uv pip install git+https://github.com/unifyai/unify

        # 6) cleanup
        rm temp_requirements.txt

    - name: Restore .cache.ndjson
      id: cache-read
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    - name: Run unit tests
      run: |
        xvfb-run .unity/bin/python -m pytest \
          --timeout=${{ inputs.test_timeout || 120 }} \
          -p no:warnings \
          -vv \
          --durations=${{ inputs.test_show_slowest || 20 }} \
          --log-cli-level=${{ inputs.test_cli_log_level || 'ERROR' }} \
          --log-file-level=${{ inputs.test_log_file_level || 'INFO' }} \
          --test-log-enable \
          --html=report.html \
          --self-contained-html \
          --junitxml=report.xml \
          --session-timeout=$((UNITY_TESTS_SESSION_TIMEOUT * 60)) \
          --test-log-file="tests.log" ${{ inputs.test_path || '.' }}
      env:
        UNITY_TESTS_SESSION_TIMEOUT: ${{ inputs.test_session_timeout || 180 }}
        UNITY_TESTS_CLI_LOGGING: ${{ inputs.test_enable_cli_logging || 'false' }}
        UNIFY_TESTS_RAND_PROJ: true
        UNIFY_TESTS_DELETE_PROJ_ON_EXIT: true
        UNIFY_KEY: ${{ secrets.USER_API_KEY }}
        UNIFY_BASE_URL: https://api.unify.ai/v0
        UNIFY_CACHE: true
        UNIFY_TRACED: false
        UNIFY_DELETE_CONTEXT_ON_EXIT: false
        UNIFY_OVERWRITE_PROJECT: true
        UNIFY_CACHE_BENCHMARK: true
        UNIFY_PRETEST_CONTEXT_CREATE: true
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        FIRST_NAME: Rick
        AGENT_FIRST: Rick
        AGENT_LAST: Morty
        AGENT_AGE: 29

        # Reduce overhead of memory manager callbacks
        REGISTER_SUMMARY_CALLBACKS: false
        REGISTER_UPDATE_CALLBACKS: false

    - name: Save updated .cache.ndjson
      if: always()
      uses: actions/cache/save@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}

    - name: Upload test artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        include-hidden-files: true
        path: |
          tests.log
          report.xml
          report.html
          .cache.ndjson
        retention-days: 7
