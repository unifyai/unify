name: Tests
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' &&
    github.event.inputs.test_path != '' &&
    format('Test {0}', github.event.inputs.test_path) ||
    github.event.head_commit.message ||
    github.event.pull_request.title
  }}

on:
  # Manual trigger - always runs tests
  workflow_dispatch:
    inputs:
      test_path:
        description: "test_path: paths to test"
        required: false
        type: string
        default: "."
      timeout_minutes:
        description: "timeout_minutes: session timeout"
        required: false
        type: number
        default: 120
      parallel_run_args:
        description: "parallel_run_args: extra arguments"
        required: false
        type: string
        default: ""

  # Push events - tests only run if commit message contains [run-tests]
  push:
    branches:
    - '**'    # All branches

  # Pull request events - tests only run if PR title contains [run-tests]
  pull_request:
    branches:
    - '**'    # All branches

jobs:
  # Determine if tests should run based on trigger and commit/PR message
  should-run-tests:
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.check.outputs.run_tests }}
      parallel_run_cmd: ${{ steps.check.outputs.parallel_run_cmd }}
    steps:
    - name: Check if tests should run
      id: check
      run: |
        # Helper function to extract [parallel_run.sh ...] content
        extract_parallel_cmd() {
          local msg="$1"
          # Extract content between [parallel_run.sh and ]
          if [[ "$msg" =~ \[parallel_run\.sh[[:space:]]+([^\]]+)\] ]]; then
            echo "${BASH_REMATCH[1]}"
          fi
        }

        # workflow_dispatch always runs tests
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "run_tests=true" >> "$GITHUB_OUTPUT"
          echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
          echo "Tests triggered by workflow_dispatch"
          exit 0
        fi

        # For push events, check commit message
        if [[ "${{ github.event_name }}" == "push" ]]; then
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          # Check for [parallel_run.sh ...] first
          PARALLEL_CMD=$(extract_parallel_cmd "$COMMIT_MSG")
          if [[ -n "$PARALLEL_CMD" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=$PARALLEL_CMD" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by commit message: [parallel_run.sh $PARALLEL_CMD]"
            exit 0
          fi

          # Fall back to [run-tests]
          if [[ "$COMMIT_MSG" == *"[run-tests]"* ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by commit message containing [run-tests]"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Skipping tests - commit message does not contain [run-tests] or [parallel_run.sh ...]"
          fi
          exit 0
        fi

        # For pull_request events, check PR title
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Check for [parallel_run.sh ...] first
          PARALLEL_CMD=$(extract_parallel_cmd "$PR_TITLE")
          if [[ -n "$PARALLEL_CMD" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=$PARALLEL_CMD" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by PR title: [parallel_run.sh $PARALLEL_CMD]"
            exit 0
          fi

          # Fall back to [run-tests]
          if [[ "$PR_TITLE" == *"[run-tests]"* ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by PR title containing [run-tests]"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Skipping tests - PR title does not contain [run-tests] or [parallel_run.sh ...]"
          fi
          exit 0
        fi

        # Default: don't run tests
        echo "run_tests=false" >> "$GITHUB_OUTPUT"
        echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
        echo "Skipping tests - unknown event type"

  black:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install black
      run: pip install black

    - name: Run black check
      run: black --diff --color --check .

  discover:
    runs-on: ubuntu-latest
    needs: should-run-tests
    if: needs.should-run-tests.outputs.run_tests == 'true'
    outputs:
      test_dirs: ${{ steps.set-matrix.outputs.test_dirs }}
      parallel_run_args: ${{ steps.set-matrix.outputs.parallel_run_args }}
      job_timeout: ${{ steps.set-matrix.outputs.job_timeout }}
      # Project deletion flags (handled at workflow level to avoid race conditions)
      delete_on_start: ${{ steps.set-matrix.outputs.delete_on_start }}
      delete_on_exit: ${{ steps.set-matrix.outputs.delete_on_exit }}
      random_projects: ${{ steps.set-matrix.outputs.random_projects }}
    steps:
    - uses: actions/checkout@v2

    - id: set-matrix
      shell: bash
      run: |
        # Parse test paths and flags, then create matrix entries for each path.
        # Each unique path gets its own parallel GitHub runner.
        #
        # Sources (priority order):
        # 1. [parallel_run.sh ...] from commit/PR → parse paths and flags
        # 2. workflow_dispatch inputs → test_path + parallel_run_args
        # 3. Default (test_path=".") → discover all test folders

        PARALLEL_CMD="${{ needs.should-run-tests.outputs.parallel_run_cmd }}"
        INPUT_PATH="${{ inputs.test_path }}"
        INPUT_ARGS="${{ inputs.parallel_run_args }}"

        # Initialize
        declare -a PATHS=()
        declare -a FLAGS=()

        if [[ -n "$PARALLEL_CMD" ]]; then
          # Parse [parallel_run.sh ...] from commit/PR message
          # Separate flags (--env, --eval-only, etc.) from paths
          echo "Parsing [parallel_run.sh $PARALLEL_CMD]" >&2
          for token in $PARALLEL_CMD; do
            if [[ "$token" == --* ]]; then
              # It's a flag - collect it and its value if needed
              FLAGS+=("$token")
            elif [[ "${FLAGS[-1]:-}" == "--env" || "${FLAGS[-1]:-}" == "--tags" || "${FLAGS[-1]:-}" == "-j" || "${FLAGS[-1]:-}" == "--jobs" || "${FLAGS[-1]:-}" == "-t" || "${FLAGS[-1]:-}" == "--timeout" ]]; then
              # Previous token was a flag that takes a value
              FLAGS+=("$token")
            else
              # It's a path
              PATHS+=("$token")
            fi
          done
        elif [[ -n "$INPUT_PATH" && "$INPUT_PATH" != "." ]]; then
          # workflow_dispatch with specific path(s)
          # Split space-separated paths into array
          read -ra PATHS <<< "$INPUT_PATH"
          # Flags come from parallel_run_args input
          if [[ -n "$INPUT_ARGS" ]]; then
            read -ra FLAGS <<< "$INPUT_ARGS"
          fi
          echo "Using test_path input: ${PATHS[*]}" >&2
        else
          # Default: discover all test folders
          while IFS= read -r dir; do
            PATHS+=("$dir")
          done < <(find tests -mindepth 1 -maxdepth 1 -type d -name 'test*' | sort)
          # Flags come from parallel_run_args input (if any)
          if [[ -n "$INPUT_ARGS" ]]; then
            read -ra FLAGS <<< "$INPUT_ARGS"
          fi
          echo "Discovered ${#PATHS[@]} test directories" >&2
        fi

        # Build JSON array of paths for matrix
        if (( ${#PATHS[@]} == 0 )); then
          echo "Error: No test paths found" >&2
          exit 1
        fi

        json=$(printf '%s\n' "${PATHS[@]}" | python3 -c 'import sys,json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))')
        echo "test_dirs=$json" >> "$GITHUB_OUTPUT"
        echo "Matrix paths: $json" >&2

        # Detect project deletion flags and random projects mode from FLAGS
        # These need workflow-level handling to avoid race conditions across runners
        DELETE_ON_START="false"
        DELETE_ON_EXIT="false"
        RANDOM_PROJECTS="false"
        declare -a CLEANED_FLAGS=()
        skip_next=false

        for i in "${!FLAGS[@]}"; do
          if $skip_next; then
            skip_next=false
            continue
          fi

          flag="${FLAGS[$i]}"
          next_val="${FLAGS[$((i+1))]:-}"

          # Check for --env with delete flags or random projects
          if [[ "$flag" == "--env" ]]; then
            case "$next_val" in
              UNIFY_TESTS_DELETE_PROJ_ON_START=true|UNIFY_TESTS_DELETE_PROJ_ON_START=True|UNIFY_TESTS_DELETE_PROJ_ON_START=1)
                DELETE_ON_START="true"
                skip_next=true
                echo "Detected DELETE_ON_START (will handle at workflow level)" >&2
                continue
                ;;
              UNIFY_TESTS_DELETE_PROJ_ON_EXIT=true|UNIFY_TESTS_DELETE_PROJ_ON_EXIT=True|UNIFY_TESTS_DELETE_PROJ_ON_EXIT=1)
                DELETE_ON_EXIT="true"
                skip_next=true
                echo "Detected DELETE_ON_EXIT (will handle at workflow level)" >&2
                continue
                ;;
              UNIFY_TESTS_RAND_PROJ=true|UNIFY_TESTS_RAND_PROJ=True|UNIFY_TESTS_RAND_PROJ=1)
                RANDOM_PROJECTS="true"
                # Keep this flag - it's safe per-runner
                CLEANED_FLAGS+=("$flag" "$next_val")
                skip_next=true
                echo "Detected RANDOM_PROJECTS mode" >&2
                continue
                ;;
            esac
          fi

          CLEANED_FLAGS+=("$flag")
        done

        echo "delete_on_start=$DELETE_ON_START" >> "$GITHUB_OUTPUT"
        echo "delete_on_exit=$DELETE_ON_EXIT" >> "$GITHUB_OUTPUT"
        echo "random_projects=$RANDOM_PROJECTS" >> "$GITHUB_OUTPUT"

        # Build flags string for parallel_run_args (with deletion flags removed)
        if (( ${#CLEANED_FLAGS[@]} > 0 )); then
          flags_str="${CLEANED_FLAGS[*]}"
          echo "parallel_run_args=$flags_str" >> "$GITHUB_OUTPUT"
          echo "Flags (cleaned): $flags_str" >&2
        else
          echo "parallel_run_args=" >> "$GITHUB_OUTPUT"
        fi

        # Compute job timeout (test timeout + 10 min buffer)
        BASE_TIMEOUT="${{ inputs.timeout_minutes }}"
        if [[ -z "$BASE_TIMEOUT" || "$BASE_TIMEOUT" == "null" ]]; then
          BASE_TIMEOUT=120
        fi
        JOB_TIMEOUT=$((BASE_TIMEOUT + 10))
        echo "job_timeout=$JOB_TIMEOUT" >> "$GITHUB_OUTPUT"

  # Setup job: runs ONCE before all pytest jobs
  # Handles project deletion on start at workflow level (avoids race conditions)
  setup:
    name: Setup (delete project on start)
    runs-on: ubuntu-latest
    needs: [should-run-tests, discover]
    # Only run if DELETE_ON_START is requested AND we're in shared project mode
    if: |
      needs.should-run-tests.outputs.run_tests == 'true' &&
      needs.discover.outputs.delete_on_start == 'true' &&
      needs.discover.outputs.random_projects != 'true'
    env:
      UNIFY_KEY: ${{ secrets.USER_API_KEY }}
      UNIFY_BASE_URL: https://orchestra-staging-lz5fmz6i7q-ew.a.run.app/v0
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install unify client
      run: pip install unify

    - name: Delete shared project (once, before all runners)
      run: |
        echo "Deleting shared project before tests start..."
        python3 << 'PYEOF'
        import os
        import unify

        project_name = os.environ.get("UNIFY_PROJECT", "UnityTests")
        try:
            unify.delete_project(project_name)
            print(f"✓ Deleted project '{project_name}'")
        except Exception as e:
            print(f"Note: Could not delete project '{project_name}': {e}")
            print("(Project may not exist yet - this is OK)")
        PYEOF

  pytest:
    name: pytest (${{ matrix.test_path }})
    runs-on: ubuntu-latest-8-cores
    environment: unity-testing
    # Fixed timeout - dynamic timeout from needs.discover.outputs caused silent job creation failure
    timeout-minutes: 130
    # Depend on setup job (it may be skipped, but that's OK - GitHub handles this)
    needs: [should-run-tests, discover, setup]
    if: |
      always() &&
      needs.should-run-tests.outputs.run_tests == 'true' &&
      (needs.setup.result == 'success' || needs.setup.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        test_path: ${{ fromJSON(needs.discover.outputs.test_dirs) }}
    # Only secrets/credentials - all behavioral settings use defaults
    env:
      UNIFY_BASE_URL: https://orchestra-staging-lz5fmz6i7q-ew.a.run.app/v0
      UNIFY_KEY: ${{ secrets.USER_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
      VERTEXAI_LOCATION: ${{ secrets.VERTEXAI_LOCATION }}
      VERTEXAI_PROJECT: ${{ secrets.VERTEXAI_PROJECT }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
    - uses: actions/checkout@v2

    - name: Normalize test path
      id: normalize-path
      run: |
        # Each matrix entry is a single test path
        echo "test_args=${{ matrix.test_path }}" >> $GITHUB_OUTPUT

        # Normalize for artifact naming
        normalized=$(echo '${{ matrix.test_path }}' | sed 's|^tests/test_||' | sed 's|^tests/||' | tr '/' '_')
        if [[ -z "$normalized" || "$normalized" == "." ]]; then normalized="all"; fi
        echo "test_path_normalized=$normalized" >> $GITHUB_OUTPUT

        # Calculate timeout in seconds (default 120 minutes)
        TIMEOUT_MINS="${{ inputs.timeout_minutes }}"
        if [[ -z "$TIMEOUT_MINS" || "$TIMEOUT_MINS" == "null" ]]; then
          TIMEOUT_MINS=120
        fi
        echo "timeout_seconds=$((TIMEOUT_MINS * 60))" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    # Cache apt packages to avoid re-downloading 170+ packages on every run
    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: >-
          tmux portaudio19-dev libnss3-dev libatk-bridge2.0-dev libdrm2
          libxkbcommon0 libgtk-3-dev libgbm-dev libgirepository1.0-dev
          libasound2t64 libatspi2.0-0 libgtk-3-0 libnspr4 libwayland-client0
          libxcomposite1 libxdamage1 libxrandr2 xvfb
        version: 1.0

    - name: Install uv
      run: pip install uv

    # Cache uv dependencies to avoid re-downloading on every run
    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-

    - name: Sync dependencies with uv
      run: |
        # Install project and dev dependencies from pyproject.toml
        uv sync --all-groups

    # Cache Playwright browsers (~500MB) to avoid re-downloading on every run
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        uv run playwright install --with-deps

    - name: Restore .cache.ndjson
      id: cache-read
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    - name: Run tests via parallel_run.sh
      id: run-tests
      run: |
        set +e
        # parallel_run_args comes from discover job (parsed from commit message or inputs)
        EXTRA_ARGS="${{ needs.discover.outputs.parallel_run_args }}"
        TEST_PATH="${{ steps.normalize-path.outputs.test_args }}"
        TIMEOUT="${{ steps.normalize-path.outputs.timeout_seconds }}"

        echo "Running: parallel_run.sh --timeout $TIMEOUT $EXTRA_ARGS $TEST_PATH"
        xvfb-run tests/parallel_run.sh --timeout "$TIMEOUT" $EXTRA_ARGS "$TEST_PATH"
        TEST_EXIT_CODE=$?
        echo "exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"
        exit $TEST_EXIT_CODE

    - name: Generate failure summary
      if: failure()
      run: |
        ARTIFACTS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"

        # Collect failed sessions from tmux (passed ones auto-close after 10s)
        FAILED_SESSIONS=""
        for sock in /tmp/tmux-$(id -u)/unity*; do
          if [ -S "$sock" ]; then
            socket_name=$(basename "$sock")
            FAILED_SESSIONS=$(tmux -L "$socket_name" ls 2>/dev/null | sed 's/: .*//' || true)
            break
          fi
        done

        # Echo to step output (foldable view)
        echo "=== Failed tests ==="
        echo "$FAILED_SESSIONS"
        echo ""
        echo "Download logs: $ARTIFACTS_URL"

        # Write to GitHub Summary page
        echo "## ❌ Test Failures: \`${{ matrix.test_path }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Failed tests:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "$FAILED_SESSIONS" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📥 **[Download full logs]($ARTIFACTS_URL)**" >> $GITHUB_STEP_SUMMARY

    - name: Generate success summary
      if: success()
      run: |
        ARTIFACTS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"

        # Count test files
        log_count=0
        if [ -d "pytest_logs" ]; then
          log_count=$(find pytest_logs -name "*.txt" -type f 2>/dev/null | wc -l | tr -d ' ')
        fi

        # Echo to step output (foldable view)
        echo "=== All tests passed ==="
        echo "$log_count tests passed"
        echo ""
        echo "View logs: $ARTIFACTS_URL"

        # Write to GitHub Summary page
        echo "## ✅ All Tests Passed: \`${{ matrix.test_path }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📊 **$log_count** tests passed — [view logs]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY

    - name: Upload cache artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cache-diff-${{ github.run_id }}-${{ steps.normalize-path.outputs.test_path_normalized }}
        path: .cache_write.ndjson
        if-no-files-found: ignore
        include-hidden-files: true
        retention-days: 1

    - name: Upload pytest logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-logs-${{ steps.normalize-path.outputs.test_path_normalized }}
        path: pytest_logs/
        if-no-files-found: ignore
        retention-days: 7

    - name: Upload LLM I/O debug logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: llm-io-debug-${{ steps.normalize-path.outputs.test_path_normalized }}
        path: llm_io_debug/
        if-no-files-found: ignore
        retention-days: 7

  # Cleanup job: runs ONCE after all pytest jobs complete
  # Handles project deletion on exit at workflow level (avoids race conditions)
  cleanup:
    name: Cleanup (delete project on exit)
    runs-on: ubuntu-latest
    needs: [should-run-tests, discover, pytest]
    # Only run if DELETE_ON_EXIT is requested AND we're in shared project mode
    if: |
      always() &&
      needs.should-run-tests.outputs.run_tests == 'true' &&
      needs.discover.outputs.delete_on_exit == 'true' &&
      needs.discover.outputs.random_projects != 'true'
    env:
      UNIFY_KEY: ${{ secrets.USER_API_KEY }}
      UNIFY_BASE_URL: https://orchestra-staging-lz5fmz6i7q-ew.a.run.app/v0
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install unify client
      run: pip install unify

    - name: Delete shared project (once, after all runners)
      run: |
        echo "Deleting shared project after all tests complete..."
        python3 << 'PYEOF'
        import os
        import unify

        project_name = os.environ.get("UNIFY_PROJECT", "UnityTests")
        try:
            unify.delete_project(project_name)
            print(f"✓ Deleted project '{project_name}'")
        except Exception as e:
            print(f"Note: Could not delete project '{project_name}': {e}")
        PYEOF

  cache-consolidation:
    name: Consolidate and store cache
    runs-on: ubuntu-latest
    needs: [should-run-tests, pytest, cleanup]
    if: always() && needs.should-run-tests.outputs.run_tests == 'true'
    steps:
    - uses: actions/checkout@v2

    - name: Restore existing consolidated cache
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    - name: Download cache artifacts from current run
      uses: actions/download-artifact@v4
      with:
        pattern: cache-diff-*
        path: cache-artifacts

    - name: Consolidate .cache.ndjson files
      run: |
        python3 .github/scripts/consolidate_cache.py \
          --artifacts-dir cache-artifacts

    - name: Store consolidated cache
      uses: actions/cache/save@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}
