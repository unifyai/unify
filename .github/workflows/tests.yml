name: Testing unify

on:
  # Manual trigger - always runs tests
  workflow_dispatch:

  push:
    branches:
    - main
    - staging

  pull_request:
    branches:
    - main
    - staging

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Install deps
      run: uv sync --group dev
    - name: Run pre-commit checks
      run: uv run pre-commit run --all-files

  integration-pytest:
    runs-on: ubuntu-latest-8-cores
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 120
    env:
      # Local orchestra configuration
      ORCHESTRA_REPO_PATH: ${{ github.workspace }}/orchestra
      # Logging directories (matches unity repo structure)
      LOGS_DIR: ${{ github.workspace }}/logs
      # Orchestra GCP configuration
      # GOOGLE_APPLICATION_CREDENTIALS is set by google-github-actions/auth step
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_LOCATION: ${{ vars.GCP_LOCATION }}
      # GCP bucket names (passed to orchestra server)
      ORCHESTRA_GCP_BUCKET_NAME: ${{ vars.GCP_BUCKET_LOGS }}
      ORCHESTRA_GCP_ASSISTANT_MEDIA_BUCKET_NAME: ${{ vars.GCP_BUCKET_ASSISTANT_IMAGES }}
      ORCHESTRA_GCP_ASSISTANT_CALL_RECORDINGS_BUCKET_NAME: ${{ vars.GCP_BUCKET_RECORDINGS }}
    steps:
    - uses: actions/checkout@v4

    - name: Clone orchestra repo for local deployment
      uses: actions/checkout@v4
      with:
        repository: unifyai/orchestra
        ref: ${{ github.ref_name == 'main' && 'main' || 'staging' }}
        path: orchestra
        token: ${{ secrets.CLONE_TOKEN }}
        fetch-depth: 1

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

    - name: Get orchestra commit SHA
      id: orchestra-sha
      run: echo "sha=$(git -C orchestra rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    # Cache uv dependencies
    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}-${{ steps.orchestra-sha.outputs.sha }}
        restore-keys: |
          uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}-
          uv-${{ runner.os }}-

    - name: Install unify deps
      run: uv sync --group dev

    - name: Install poetry (for orchestra)
      run: pipx install poetry

    - name: Install orchestra dependencies
      run: |
        cd "$ORCHESTRA_REPO_PATH"
        poetry install --no-interaction

    - name: Setup logging directories
      run: |
        # Create log directories matching unity repo structure
        mkdir -p "$LOGS_DIR/unify"
        mkdir -p "$LOGS_DIR/orchestra"
        mkdir -p "$LOGS_DIR/all"
        echo "Created logging directories:"
        echo "  - $LOGS_DIR/unify/     (unify client logs)"
        echo "  - $LOGS_DIR/orchestra/ (orchestra request logs)"
        echo "  - $LOGS_DIR/all/       (OpenTelemetry traces)"

    - name: Start local orchestra
      run: |
        # Start local orchestra with test user seeding, logging, and enough workers for parallel tests
        ORCHESTRA_SEED_USER=1 \
        ORCHESTRA_WORKERS=8 \
        ORCHESTRA_LOG_DIR="$LOGS_DIR/orchestra" \
        ORCHESTRA_OTEL_LOG_DIR="$LOGS_DIR/all" \
        UNIFY_KEY="${{ secrets.UNIFY_KEY }}" \
        "$ORCHESTRA_REPO_PATH/scripts/local.sh" start

        # Export the local URL for tests
        echo "ORCHESTRA_URL=http://127.0.0.1:8000/v0" >> $GITHUB_ENV

    - name: Run integration tests
      id: pytest
      run: |
        set +e
        # Run pytest and capture output for summary extraction
        uv run pytest --timeout=120 -p no:warnings -vv -n auto tests/ 2>&1 | tee pytest_output.txt
        exit_code=${PIPESTATUS[0]}
        echo "exit_code=$exit_code" >> $GITHUB_OUTPUT

        # Extract pass/fail/error/skip counts from pytest summary line
        # Format: "X passed, Y failed, Z errors, W skipped in N.NNs"
        summary_line=$(grep -E "^=+ .*(passed|failed|error).* in [0-9]+(\.[0-9]+)?s" pytest_output.txt | tail -1)
        if [ -n "$summary_line" ]; then
          passed=$(echo "$summary_line" | grep -oE "[0-9]+ passed" | grep -oE "[0-9]+" || echo "0")
          failed=$(echo "$summary_line" | grep -oE "[0-9]+ failed" | grep -oE "[0-9]+" || echo "0")
          skipped=$(echo "$summary_line" | grep -oE "[0-9]+ skipped" | grep -oE "[0-9]+" || echo "0")
          errors=$(echo "$summary_line" | grep -oE "[0-9]+ error" | grep -oE "[0-9]+" || echo "0")
          echo "passed=${passed:-0}" >> $GITHUB_OUTPUT
          echo "failed=${failed:-0}" >> $GITHUB_OUTPUT
          echo "skipped=${skipped:-0}" >> $GITHUB_OUTPUT
          echo "errors=${errors:-0}" >> $GITHUB_OUTPUT
        else
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "failed=0" >> $GITHUB_OUTPUT
          echo "skipped=0" >> $GITHUB_OUTPUT
          echo "errors=0" >> $GITHUB_OUTPUT
        fi

        exit $exit_code
      env:
        UNIFY_KEY: ${{ secrets.UNIFY_KEY }}
        # Enable OpenTelemetry tracing for unify client
        UNIFY_OTEL: "true"
        UNIFY_OTEL_LOG_DIR: ${{ env.LOGS_DIR }}/all

    - name: Generate success summary
      if: success()
      run: |
        ARTIFACTS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
        PASSED="${{ steps.pytest.outputs.passed }}"
        SKIPPED="${{ steps.pytest.outputs.skipped }}"

        STATS="**${PASSED}** passed"
        [ "$SKIPPED" -gt 0 ] 2>/dev/null && STATS="$STATS, **${SKIPPED}** skipped"

        echo "## ✅ All Tests Passed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "$STATS — [view logs]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY

    - name: Generate failure summary
      if: failure()
      run: |
        ARTIFACTS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
        PASSED="${{ steps.pytest.outputs.passed }}"
        FAILED="${{ steps.pytest.outputs.failed }}"
        SKIPPED="${{ steps.pytest.outputs.skipped }}"
        ERRORS="${{ steps.pytest.outputs.errors }}"

        STATS="**${PASSED}** passed"
        [ "$FAILED" -gt 0 ] 2>/dev/null && STATS="$STATS, **${FAILED}** failed"
        [ "$ERRORS" -gt 0 ] 2>/dev/null && STATS="$STATS, **${ERRORS}** errors"
        [ "$SKIPPED" -gt 0 ] 2>/dev/null && STATS="$STATS, **${SKIPPED}** skipped"

        echo "## ❌ Tests Failed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "$STATS — [view logs]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY

    - name: Dump orchestra logs on failure
      if: failure()
      run: |
        echo "=== Orchestra Server Logs ==="
        if [ -f /tmp/orchestra-local-server.log ]; then
          cat /tmp/orchestra-local-server.log
          # Copy server log to logs/orchestra/ for artifact upload
          cp /tmp/orchestra-local-server.log "$LOGS_DIR/orchestra/server.log"
        else
          echo "No orchestra log file found"
        fi

    - name: Prepare logs for upload
      if: always()
      run: |
        echo "=== Preparing logs for upload ==="

        # Copy orchestra server log (always, not just on failure)
        if [ -f /tmp/orchestra-local-server.log ]; then
          cp /tmp/orchestra-local-server.log "$LOGS_DIR/orchestra/server.log"
          echo "✓ Copied orchestra server log"
        fi

        # --- unify logs ---
        if [ -d "$LOGS_DIR/unify" ]; then
          file_count=$(find "$LOGS_DIR/unify" -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "✓ unify logs: $file_count files"
        else
          echo "○ unify logs: directory not found"
        fi

        # --- orchestra logs (requires filename sanitization for Windows compatibility) ---
        if [ -d "$LOGS_DIR/orchestra" ]; then
          # Sanitize filenames for cross-platform compatibility (Windows NTFS).
          # Invalid characters: " : < > | * ? \r \n
          # This is a fallback; the exporter should already sanitize these.
          sanitized=0
          failed=0
          while IFS= read -r -d '' file; do
            dir=$(dirname "$file")
            base=$(basename "$file")
            # Replace all NTFS-invalid characters with underscores
            newbase=$(echo "$base" | tr ':"<>|*?' '_____?_' | tr -d '\r\n')
            newname="$dir/$newbase"
            if [ "$file" != "$newname" ]; then
              if mv "$file" "$newname" 2>&1; then
                ((sanitized++)) || true
              else
                echo "  ⚠ Failed to rename: $file"
                ((failed++)) || true
              fi
            fi
          done < <(find "$LOGS_DIR/orchestra" -type f \( -name '*:*' -o -name '*"*' -o -name '*<*' -o -name '*>*' -o -name '*|*' -o -name '*?*' \) -print0 2>/dev/null || true)

          file_count=$(find "$LOGS_DIR/orchestra" -type f 2>/dev/null | wc -l | tr -d ' ')
          if [ "$sanitized" -gt 0 ]; then
            echo "✓ orchestra logs: $file_count files ($sanitized filenames sanitized)"
          else
            echo "✓ orchestra logs: $file_count files"
          fi
          if [ "$failed" -gt 0 ]; then
            echo "  ⚠ $failed filenames failed to sanitize"
          fi
        else
          echo "○ orchestra logs: directory not found"
        fi

        # --- OpenTelemetry traces ---
        if [ -d "$LOGS_DIR/all" ]; then
          file_count=$(find "$LOGS_DIR/all" -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "✓ OpenTelemetry traces: $file_count files"
        else
          echo "○ OpenTelemetry traces: directory not found"
        fi

        echo "=== Log preparation complete ==="

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ github.run_id }}
        path: logs/
        if-no-files-found: ignore
        retention-days: 90

    - name: Stop local orchestra
      if: always()
      run: |
        "$ORCHESTRA_REPO_PATH/scripts/local.sh" stop || true
