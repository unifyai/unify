name: Tests
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' &&
    github.event.inputs.test_path != '' &&
    format('Test {0}', github.event.inputs.test_path) ||
    github.event.head_commit.message ||
    github.event.pull_request.title
  }}

on:
  # Manual trigger - always runs tests
  workflow_dispatch:
    inputs:
      test_path:
        description: "test_path: paths to test"
        required: false
        type: string
        default: "."
      timeout_minutes:
        description: "timeout_minutes: session timeout"
        required: false
        type: number
        default: 120
      parallel_run_args:
        description: "parallel_run_args: extra arguments"
        required: false
        type: string
        default: ""

  # Push events - tests only run if commit message contains [run-tests]
  push:
    branches:
    - '**'    # All branches

  # Pull request events - tests only run if PR title contains [run-tests]
  pull_request:
    branches:
    - '**'    # All branches

jobs:
  # Determine if tests should run based on trigger and commit/PR message
  should-run-tests:
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.check.outputs.run_tests }}
      parallel_run_cmd: ${{ steps.check.outputs.parallel_run_cmd }}
    steps:
    - name: Check if tests should run
      id: check
      run: |
        # Helper function to extract [parallel_run.sh ...] content
        extract_parallel_cmd() {
          local msg="$1"
          # Extract content between [parallel_run.sh and ]
          if [[ "$msg" =~ \[parallel_run\.sh[[:space:]]+([^\]]+)\] ]]; then
            echo "${BASH_REMATCH[1]}"
          fi
        }

        # workflow_dispatch always runs tests
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "run_tests=true" >> "$GITHUB_OUTPUT"
          echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
          echo "Tests triggered by workflow_dispatch"
          exit 0
        fi

        # For push events, check commit message
        if [[ "${{ github.event_name }}" == "push" ]]; then
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          # Check for [parallel_run.sh ...] first
          PARALLEL_CMD=$(extract_parallel_cmd "$COMMIT_MSG")
          if [[ -n "$PARALLEL_CMD" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=$PARALLEL_CMD" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by commit message: [parallel_run.sh $PARALLEL_CMD]"
            exit 0
          fi

          # Fall back to [run-tests]
          if [[ "$COMMIT_MSG" == *"[run-tests]"* ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by commit message containing [run-tests]"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Skipping tests - commit message does not contain [run-tests] or [parallel_run.sh ...]"
          fi
          exit 0
        fi

        # For pull_request events, check PR title
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Check for [parallel_run.sh ...] first
          PARALLEL_CMD=$(extract_parallel_cmd "$PR_TITLE")
          if [[ -n "$PARALLEL_CMD" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=$PARALLEL_CMD" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by PR title: [parallel_run.sh $PARALLEL_CMD]"
            exit 0
          fi

          # Fall back to [run-tests]
          if [[ "$PR_TITLE" == *"[run-tests]"* ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Tests triggered by PR title containing [run-tests]"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
            echo "Skipping tests - PR title does not contain [run-tests] or [parallel_run.sh ...]"
          fi
          exit 0
        fi

        # Default: don't run tests
        echo "run_tests=false" >> "$GITHUB_OUTPUT"
        echo "parallel_run_cmd=" >> "$GITHUB_OUTPUT"
        echo "Skipping tests - unknown event type"

  black:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install black
      run: pip install black

    - name: Run black check
      run: black --diff --color --check .

  discover:
    runs-on: ubuntu-latest
    needs: should-run-tests
    if: needs.should-run-tests.outputs.run_tests == 'true'
    outputs:
      test_dirs: ${{ steps.set-matrix.outputs.test_dirs }}
      parallel_run_cmd: ${{ needs.should-run-tests.outputs.parallel_run_cmd }}
      job_timeout: ${{ steps.set-matrix.outputs.job_timeout }}
    steps:
    - uses: actions/checkout@v2

    - id: set-matrix
      shell: bash
      run: |
        # Priority order:
        # 1. [parallel_run.sh ...] from commit/PR → single job with extracted args
        # 2. workflow_dispatch test_path input → single job (if not '.')
        # 3. Default → discover all test folders for matrix

        PARALLEL_CMD="${{ needs.should-run-tests.outputs.parallel_run_cmd }}"

        if [[ -n "$PARALLEL_CMD" ]]; then
          # Extract just the paths from the command (for matrix), full cmd used later
          # Use the entire command as a single matrix entry
          dirs="__parallel_run_cmd__"
          echo "Using [parallel_run.sh $PARALLEL_CMD] from commit/PR" >&2
        elif [[ -n "${{ inputs.test_path }}" && "${{ inputs.test_path }}" != "." ]]; then
          dirs="${{ inputs.test_path }}"
          echo "Using test_path input: $dirs" >&2
        else
          dirs=$(find tests -mindepth 1 -maxdepth 1 -type d -name 'test*' -printf '%p\n' | sort)
          echo "Discovered test dirs:" >&2
          echo "$dirs" >&2
        fi

        json=$(printf '%s\n' "$dirs" | python3 -c 'import sys,json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))')
        echo "test_dirs=$json" >> "$GITHUB_OUTPUT"

        # Compute job timeout (test timeout + 10 min buffer)
        # GitHub expressions don't support arithmetic, so compute here
        # Note: inputs context doesn't exist for push/PR events, so use shell fallback
        BASE_TIMEOUT="${{ inputs.timeout_minutes }}"
        if [[ -z "$BASE_TIMEOUT" || "$BASE_TIMEOUT" == "null" ]]; then
          BASE_TIMEOUT=120
        fi
        JOB_TIMEOUT=$((BASE_TIMEOUT + 10))
        echo "job_timeout=$JOB_TIMEOUT" >> "$GITHUB_OUTPUT"

  pytest:
    name: pytest (${{ matrix.test_path == '__parallel_run_cmd__' && 'from commit' || matrix.test_path }})
    runs-on: ubuntu-latest-8-cores
    environment: unity-testing
    # Fixed timeout - dynamic timeout from needs.discover.outputs caused silent job creation failure
    timeout-minutes: 130
    needs: [should-run-tests, discover]
    if: needs.should-run-tests.outputs.run_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        test_path: ${{ fromJSON(needs.discover.outputs.test_dirs) }}
    # Only secrets/credentials - all behavioral settings use defaults
    env:
      UNIFY_KEY: ${{ secrets.USER_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
      VERTEXAI_LOCATION: ${{ secrets.VERTEXAI_LOCATION }}
      VERTEXAI_PROJECT: ${{ secrets.VERTEXAI_PROJECT }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
    - uses: actions/checkout@v2

    - name: Normalize test path
      id: normalize-path
      run: |
        # Determine if we're using [parallel_run.sh ...] from commit/PR
        if [[ '${{ matrix.test_path }}' == '__parallel_run_cmd__' ]]; then
          # Use the extracted command from commit/PR message
          PARALLEL_CMD='${{ needs.discover.outputs.parallel_run_cmd }}'
          echo "test_args=$PARALLEL_CMD" >> $GITHUB_OUTPUT
          # Normalize for artifact naming (use first path or 'custom')
          first_path=$(echo "$PARALLEL_CMD" | grep -oE 'tests/[^ ]+' | head -1 || echo "custom")
          normalized=$(echo "$first_path" | sed 's|^tests/test_||' | tr '/' '_')
          if [[ -z "$normalized" ]]; then normalized="custom"; fi
          echo "test_path_normalized=$normalized" >> $GITHUB_OUTPUT
        else
          # Normal matrix path
          echo "test_args=${{ matrix.test_path }}" >> $GITHUB_OUTPUT
          normalized=$(echo '${{ matrix.test_path }}' | sed 's|^tests/test_||' | tr '/' '_')
          echo "test_path_normalized=$normalized" >> $GITHUB_OUTPUT
        fi

        # Calculate timeout in seconds (default 120 minutes)
        TIMEOUT_MINS="${{ inputs.timeout_minutes }}"
        if [[ -z "$TIMEOUT_MINS" || "$TIMEOUT_MINS" == "null" ]]; then
          TIMEOUT_MINS=120
        fi
        echo "timeout_seconds=$((TIMEOUT_MINS * 60))" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    # Cache apt packages to avoid re-downloading 170+ packages on every run
    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: >-
          tmux portaudio19-dev libnss3-dev libatk-bridge2.0-dev libdrm2
          libxkbcommon0 libgtk-3-dev libgbm-dev libgirepository1.0-dev
          libasound2t64 libatspi2.0-0 libgtk-3-0 libnspr4 libwayland-client0
          libxcomposite1 libxdamage1 libxrandr2 xvfb
        version: 1.0

    - name: Install uv
      run: pip install uv

    # Cache uv dependencies to avoid re-downloading on every run
    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-

    - name: Sync dependencies with uv
      run: |
        # Install project and dev dependencies from pyproject.toml
        uv sync --all-groups

    # Cache Playwright browsers (~500MB) to avoid re-downloading on every run
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        uv run playwright install --with-deps

    - name: Restore .cache.ndjson
      id: cache-read
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    - name: Run tests via parallel_run.sh
      id: run-tests
      run: |
        set +e
        xvfb-run tests/parallel_run.sh --timeout ${{ steps.normalize-path.outputs.timeout_seconds }} ${{ inputs.parallel_run_args }} ${{ steps.normalize-path.outputs.test_args }}
        TEST_EXIT_CODE=$?
        echo "exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"
        exit $TEST_EXIT_CODE

    - name: Generate failure summary
      if: failure()
      run: |
        echo "## ❌ Test Failures: \`${{ matrix.test_path }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # List failed test logs (simpler than parsing contents)
        if [ -d "pytest_logs" ]; then
          log_dir=$(ls -d pytest_logs/*/ 2>/dev/null | head -1)
          if [ -n "$log_dir" ]; then
            echo "### Failed tests:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            # List log files (each corresponds to a test)
            for log_file in "$log_dir"*.txt; do
              if [ -f "$log_file" ]; then
                filename=$(basename "$log_file" .txt)
                echo "- \`$filename\`" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "⚠️ No pytest_logs directory found" >> $GITHUB_STEP_SUMMARY
        fi

        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📋 **See the \"Run tests via parallel_run.sh\" step above** for inline failure details." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📥 **Download full logs** from the Artifacts section below." >> $GITHUB_STEP_SUMMARY

    - name: Generate success summary
      if: success()
      run: |
        echo "## ✅ All Tests Passed: \`${{ matrix.test_path }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Count and list test files
        if [ -d "pytest_logs" ]; then
          log_dir=$(ls -d pytest_logs/*/ 2>/dev/null | head -1)
          if [ -n "$log_dir" ]; then
            log_count=$(find "$log_dir" -name "*.txt" -type f 2>/dev/null | wc -l | tr -d ' ')
            echo "📊 **$log_count** tests passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>View test list</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for log_file in "$log_dir"*.txt; do
              if [ -f "$log_file" ]; then
                filename=$(basename "$log_file" .txt)
                echo "- \`$filename\`" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi
        fi

    - name: Upload cache artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cache-diff-${{ github.run_id }}-${{ steps.normalize-path.outputs.test_path_normalized }}
        path: .cache_write.ndjson
        if-no-files-found: ignore
        include-hidden-files: true
        retention-days: 1

    - name: Upload pytest logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-logs-${{ steps.normalize-path.outputs.test_path_normalized }}
        path: pytest_logs/
        if-no-files-found: ignore
        retention-days: 7

    - name: Upload LLM I/O debug logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: llm-io-debug-${{ steps.normalize-path.outputs.test_path_normalized }}
        path: llm_io_debug/
        if-no-files-found: ignore
        retention-days: 7

  consolidate-logs:
    name: Consolidate all logs
    runs-on: ubuntu-latest
    needs: [should-run-tests, pytest]
    if: always() && needs.should-run-tests.outputs.run_tests == 'true'
    steps:
    - name: Download all pytest logs
      uses: actions/download-artifact@v4
      with:
        pattern: pytest-logs-*
        path: all-pytest-logs
        merge-multiple: false

    - name: Download all LLM I/O debug logs
      uses: actions/download-artifact@v4
      with:
        pattern: llm-io-debug-*
        path: all-llm-io-debug
        merge-multiple: false

    - name: Reorganize logs for easy browsing
      run: |
        # Create consolidated directories
        mkdir -p consolidated/pytest_logs
        mkdir -p consolidated/llm_io_debug

        # Move pytest logs, preserving folder structure
        if [ -d "all-pytest-logs" ]; then
          for dir in all-pytest-logs/pytest-logs-*/; do
            if [ -d "$dir" ]; then
              # Extract test folder name (e.g., tests_test_actor -> test_actor)
              folder_name=$(basename "$dir" | sed 's/^pytest-logs-tests_//')
              # Copy contents, flattening one level
              for subdir in "$dir"*/; do
                if [ -d "$subdir" ]; then
                  cp -r "$subdir" "consolidated/pytest_logs/${folder_name}_$(basename "$subdir")"
                fi
              done
              # Also copy any direct files
              find "$dir" -maxdepth 1 -type f -exec cp {} "consolidated/pytest_logs/" \; 2>/dev/null || true
            fi
          done
        fi

        # Move LLM I/O debug logs similarly
        if [ -d "all-llm-io-debug" ]; then
          for dir in all-llm-io-debug/llm-io-debug-*/; do
            if [ -d "$dir" ]; then
              folder_name=$(basename "$dir" | sed 's/^llm-io-debug-tests_//')
              for subdir in "$dir"*/; do
                if [ -d "$subdir" ]; then
                  cp -r "$subdir" "consolidated/llm_io_debug/${folder_name}_$(basename "$subdir")"
                fi
              done
              find "$dir" -maxdepth 1 -type f -exec cp {} "consolidated/llm_io_debug/" \; 2>/dev/null || true
            fi
          done
        fi

        # Show what we collected
        echo "=== Consolidated pytest_logs ==="
        ls -la consolidated/pytest_logs/ 2>/dev/null || echo "(empty)"
        echo ""
        echo "=== Consolidated llm_io_debug ==="
        ls -la consolidated/llm_io_debug/ 2>/dev/null || echo "(empty)"

    - name: Upload consolidated logs
      uses: actions/upload-artifact@v4
      with:
        name: all-logs-consolidated
        path: consolidated/
        if-no-files-found: ignore
        retention-days: 7

    - name: Generate consolidated summary
      run: |
        echo "## 📦 Consolidated Test Logs" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "All test logs have been consolidated into a single artifact: **\`all-logs-consolidated\`**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Directory structure:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "all-logs-consolidated/" >> $GITHUB_STEP_SUMMARY
        echo "├── pytest_logs/      # Test output logs" >> $GITHUB_STEP_SUMMARY
        echo "│   ├── actor_*/" >> $GITHUB_STEP_SUMMARY
        echo "│   ├── conductor_*/" >> $GITHUB_STEP_SUMMARY
        echo "│   └── ..." >> $GITHUB_STEP_SUMMARY
        echo "└── llm_io_debug/     # LLM request/response traces" >> $GITHUB_STEP_SUMMARY
        echo "    ├── actor_*/" >> $GITHUB_STEP_SUMMARY
        echo "    ├── conductor_*/" >> $GITHUB_STEP_SUMMARY
        echo "    └── ..." >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Count files
        pytest_count=$(find consolidated/pytest_logs -type f 2>/dev/null | wc -l)
        llm_count=$(find consolidated/llm_io_debug -type f 2>/dev/null | wc -l)
        echo "📊 **$pytest_count** pytest log files, **$llm_count** LLM I/O debug files" >> $GITHUB_STEP_SUMMARY

  cache-consolidation:
    name: Consolidate and store cache
    runs-on: ubuntu-latest
    needs: [should-run-tests, pytest]
    if: always() && needs.should-run-tests.outputs.run_tests == 'true'
    steps:
    - uses: actions/checkout@v2

    - name: Restore existing consolidated cache
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          cache-ndjson-${{ runner.os }}-

    - name: Download cache artifacts from current run
      uses: actions/download-artifact@v4
      with:
        pattern: cache-diff-*
        path: cache-artifacts

    - name: Consolidate .cache.ndjson files
      run: |
        python3 .github/scripts/consolidate_cache.py \
          --artifacts-dir cache-artifacts

    - name: Store consolidated cache
      uses: actions/cache/save@v4
      with:
        path: .cache.ndjson
        key: cache-ndjson-${{ runner.os }}-${{ github.run_id }}
