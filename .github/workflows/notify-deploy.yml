# NOTE: This workflow is configured for Unify's internal CI/CD.
# Fork users: this will not run without the required secrets.
name: Notify downstream deploy

on:
  push:
    branches: [staging, main, preview]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
    - name: Trigger downstream rebuild
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.CLONE_TOKEN }}
        repository: ${{ secrets.DEPLOY_REPO }}
        event-type: upstream-updated
        client-payload: '{"branch": "${{ github.ref_name }}", "sha": "${{ github.sha }}"}'
