steps:
  # Build Docker Image
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-image'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    docker build --build-arg UNIFY_KEY=$$ORCHESTRA_API_KEY --build-arg GITHUB_TOKEN=$$GITHUB_TOKEN --build-arg BRANCH=staging \
      -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-staging:${SHORT_SHA} \
      -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-staging:latest .
  secretEnv: ['ORCHESTRA_API_KEY', 'GITHUB_TOKEN']

  # Push Docker Image (SHA Tag)
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-sha-tag'
  args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-staging:${SHORT_SHA}']
  waitFor: ['build-image']

  # Push Docker Image (Latest Tag)
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-latest-tag'
  args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-staging:latest']
  waitFor: ['build-image']

  # Upload SHA to Cloud Storage
- name: 'gcr.io/cloud-builders/gsutil'
  id: 'upload-sha'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo ${SHORT_SHA} | gsutil cp - gs://unity-image-hash/image_hash_staging.txt
  waitFor: ['push-latest-tag']

  # Refresh idle containers so they pick up the new image
- name: 'gcr.io/cloud-builders/curl'
  id: 'refresh-idle-jobs'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    ADAPTERS=https://unity-adapters-staging-ky4ja5fxna-uc.a.run.app
    AUTH="Authorization: Bearer $$ORCHESTRA_ADMIN_KEY"

    echo "Creating 2 fresh idle jobs..."
    curl -sf -X POST -H "$${AUTH}" "$${ADAPTERS}/scheduled/jobs/create" && echo
    curl -sf -X POST -H "$${AUTH}" "$${ADAPTERS}/scheduled/jobs/create" && echo

    echo "Waiting 30s for jobs to register as idle..."
    sleep 30

    echo "Cleaning up stale idle jobs..."
    curl -sf -X POST -H "$${AUTH}" "$${ADAPTERS}/scheduled/jobs/cleanup" && echo
    echo "Idle job refresh complete."
  secretEnv: ['ORCHESTRA_ADMIN_KEY']
  waitFor: ['upload-sha']

# Options
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

# Substitution variables
substitutions:
  _REGION: 'us-central1'  # Change to your preferred region
  _REPOSITORY: 'unity'  # Change to your Artifact Registry repository name

# Available secrets
availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_ID}/secrets/ORCHESTRA_API_KEY/versions/latest
    env: 'ORCHESTRA_API_KEY'
  - versionName: projects/${PROJECT_ID}/secrets/DEVBOT_GITHUB_TOKEN/versions/latest
    env: 'GITHUB_TOKEN'
  - versionName: projects/${PROJECT_ID}/secrets/ORCHESTRA_ADMIN_KEY/versions/latest
    env: 'ORCHESTRA_ADMIN_KEY'

# Timeout
timeout: '1800s'  # 30 minutes

# Images to be pushed (for Cloud Build history)
images:
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-staging:${SHORT_SHA}'
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-staging:latest'
