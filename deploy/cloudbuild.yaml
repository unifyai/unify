steps:
  # Pull previous image for Docker layer cache (may not exist on first run)
- name: 'gcr.io/cloud-builders/docker'
  id: 'pull-cache'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base:latest || true

  # Resolve latest commit SHAs from dependency repos so the Docker layer cache
  # is busted whenever unify or unillm change (git clone text is static, so
  # without this the layer would be served from cache with stale code).
- name: 'gcr.io/cloud-builders/git'
  id: 'resolve-dep-shas'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    UNIFY_SHA=$$(git ls-remote https://$$GITHUB_TOKEN@github.com/unifyai/unify.git refs/heads/main | cut -f1)
    UNILLM_SHA=$$(git ls-remote https://$$GITHUB_TOKEN@github.com/unifyai/unillm.git refs/heads/main | cut -f1)
    echo "$${UNIFY_SHA}-$${UNILLM_SHA}" > /workspace/dep_repos_sha.txt
    echo "Dependency SHAs: unify=$${UNIFY_SHA:0:8} unillm=$${UNILLM_SHA:0:8}"
  secretEnv: ['GITHUB_TOKEN']
  waitFor: ['-']

  # Build Docker image with BuildKit inline cache.
  # --cache-from reuses layers from the previous image, so only changed layers rebuild.
  # BUILDKIT_INLINE_CACHE=1 embeds cache metadata in the pushed image for next build.
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-image'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    DEP_SHA=$$(cat /workspace/dep_repos_sha.txt)
    DOCKER_BUILDKIT=1 docker build \
      --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base:latest \
      --build-arg BUILDKIT_INLINE_CACHE=1 \
      --build-arg UNIFY_KEY=$$ORCHESTRA_API_KEY \
      --build-arg GITHUB_TOKEN=$$GITHUB_TOKEN \
      --build-arg DEP_REPOS_SHA=$$DEP_SHA \
      -f deploy/Dockerfile \
      -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base:${SHORT_SHA} \
      -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base:latest .
  secretEnv: ['ORCHESTRA_API_KEY', 'GITHUB_TOKEN']
  waitFor: ['pull-cache', 'resolve-dep-shas']

  # Push Docker Image (SHA and latest tags in parallel)
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-sha-tag'
  args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base:${SHORT_SHA}']
  waitFor: ['build-image']

- name: 'gcr.io/cloud-builders/docker'
  id: 'push-latest-tag'
  args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base:latest']
  waitFor: ['build-image']

  # Build job-watcher image (reuses the same repo root context as Unity)
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-job-watcher'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    DOCKER_BUILDKIT=1 docker build \
      --build-arg GITHUB_TOKEN=$$GITHUB_TOKEN \
      -f deploy/scripts/job-watcher/Dockerfile \
      -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/job-watcher:${SHORT_SHA} \
      -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/job-watcher:latest .
  secretEnv: ['GITHUB_TOKEN']
  waitFor: ['-']

- name: 'gcr.io/cloud-builders/docker'
  id: 'push-job-watcher'
  args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/job-watcher']
  waitFor: ['build-job-watcher']

  # Deploy job-watcher to production (creates Deployment on first run, updates image on subsequent runs)
- name: 'gcr.io/cloud-builders/kubectl'
  id: 'deploy-job-watcher'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    gcloud container clusters get-credentials unity --region ${_REGION} --project ${PROJECT_ID}
    sed "s|image:.*job-watcher.*|image: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/job-watcher:${SHORT_SHA}|" \
      deploy/scripts/job-watcher/deployment.yaml | kubectl apply -f -
  waitFor: ['push-job-watcher']

  # Trigger enterprise overlay build in unity-deploy.
  # Passes the just-pushed base image as a substitution so unity-deploy
  # builds FROM this exact image (not a stale :latest).
  # unity-deploy handles GCS upload and idle job refresh.
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'trigger-deploy-build'
  args:
  - 'builds'
  - 'triggers'
  - 'run'
  - 'unity-deploy'
  - '--project=${PROJECT_ID}'
  - '--branch=main'
  - '--substitutions=_BASE_IMAGE=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base:${SHORT_SHA}'
  waitFor: ['push-sha-tag', 'push-latest-tag']

# Options
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

# Substitution variables
substitutions:
  _REGION: 'us-central1'
  _REPOSITORY: 'unity'

# Available secrets
availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_ID}/secrets/ORCHESTRA_API_KEY/versions/latest
    env: 'ORCHESTRA_API_KEY'
  - versionName: projects/${PROJECT_ID}/secrets/DEVBOT_GITHUB_TOKEN/versions/latest
    env: 'GITHUB_TOKEN'

# Timeout
timeout: '1800s'  # 30 minutes

# Images to be pushed (for Cloud Build history)
images:
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base:${SHORT_SHA}'
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base:latest'
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/job-watcher:${SHORT_SHA}'
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/job-watcher:latest'
