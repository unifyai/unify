schema_version = 1
environment = "staging"

[providers.composio]
status = "enabled"
display_name = "Composio"
default_priority = 10

[providers.composio.config_json]
timeout_seconds = 60
max_pages = 250
max_items = 50000

[providers.composio.sync]
mode = "full"
tool_limit_per_app = 0
include_all_managed_apps = true
create_auth_configs = false

[providers.pipedream]
status = "disabled"
display_name = "Pipedream"
default_priority = 20

[providers.pipedream.config_json]
timeout_seconds = 60
max_pages = 250
max_items = 50000

[providers.pipedream.sync]
mode = "partial"
app_slugs = [
  "slack",
  "github",
  "hubspot",
  "microsoft_outlook",
  "microsoft_teams",
  "microsoft_excel",
  "onedrive",
  "airtable",
  "linear",
  "salesforce"
]
component_limit_per_app = 0
include_all_apps = false
