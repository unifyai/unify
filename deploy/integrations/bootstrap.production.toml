schema_version = 1
environment = "production"

[providers.composio]
status = "enabled"
display_name = "Composio"
default_priority = 10

[providers.composio.config_json]
timeout_seconds = 60
max_pages = 250
max_items = 50000
tool_fetch_concurrency = 8

[providers.composio.sync]
mode = "full"
tool_limit_per_app = 0
include_all_managed_apps = true
create_auth_configs = false
# Operational one-off resync directive (NOT part of the desired-state hash):
# set true to bypass the manifest-hash and per-unit/checkpoint skips and rewrite
# every app/tool row (e.g. after a catalog schema or embedding-text change), then
# set back to false. Leaving it true keeps forcing a full resync on every deploy.
force = false

[providers.pipedream]
status = "disabled"
display_name = "Pipedream"
default_priority = 20

[providers.pipedream.config_json]
timeout_seconds = 60
max_pages = 250
max_items = 50000

[providers.pipedream.sync]
mode = "partial"
app_slugs = []
component_limit_per_app = 0
include_all_apps = true
