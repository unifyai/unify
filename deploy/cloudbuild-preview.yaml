# Cloud Build pipeline for preview-environment Unity base images.
#
# Triggered on push to ``feature/*`` branches.  Builds the unity-base
# image with a slug-prefixed tag and triggers ``unity-deploy-preview``
# to apply the enterprise overlay and upload the per-branch GCS image
# hash blob (``image_hash_staging_<slug>.txt``).
#
# A preview-environment Comms App revision (``BRANCH_TAG=<slug>``)
# reads that per-branch blob via ``Settings.image_hash_blob`` and
# spawns assistant Jobs from this image, so feature-branch Unity code
# is exercised end-to-end without disturbing the shared staging warm
# pool, the staging job-watcher, or the staging pipeline workers.
#
# Singletons (``job-watcher-staging``, pipeline workers, control-plane
# reconcile) are intentionally untouched: preview revisions share
# those with the rest of staging.
steps:
- name: 'gcr.io/cloud-builders/docker'
  id: 'compute-slug'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -euo pipefail
    SLUG=$(echo "${BRANCH_NAME}" \
      | sed -E 's|^feature/||; s|[^a-z0-9-]+|-|g; s|^-+||; s|-+$||' \
      | tr '[:upper:]' '[:lower:]' \
      | cut -c1-30 \
      | sed -E 's|-+$||')
    if [ -z "$$SLUG" ]; then
      echo "ERROR: empty preview slug from branch name '${BRANCH_NAME}'" >&2
      exit 1
    fi
    echo "$$SLUG" > /workspace/slug.txt
    echo "preview slug: $$SLUG"
  waitFor: ['-']

- name: 'gcr.io/cloud-builders/docker'
  id: 'pull-cache'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base-staging:latest || true
  waitFor: ['-']

  # Resolve dependency repo SHAs so the layer cache busts when unify or
  # unillm change.  Mirrors the staging build's behavior.
- name: 'gcr.io/cloud-builders/git'
  id: 'resolve-dep-shas'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    UNIFY_SHA=$$(git ls-remote https://$$GITHUB_TOKEN@github.com/unifyai/unify.git refs/heads/staging | cut -f1)
    UNILLM_SHA=$$(git ls-remote https://$$GITHUB_TOKEN@github.com/unifyai/unillm.git refs/heads/staging | cut -f1)
    echo "$${UNIFY_SHA}-$${UNILLM_SHA}" > /workspace/dep_repos_sha.txt
    echo "Dependency SHAs: unify=$${UNIFY_SHA:0:8} unillm=$${UNILLM_SHA:0:8}"
  secretEnv: ['GITHUB_TOKEN']
  waitFor: ['-']

- name: 'gcr.io/cloud-builders/docker'
  id: 'build-image'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -euo pipefail
    SLUG=$(cat /workspace/slug.txt)
    DEP_SHA=$$(cat /workspace/dep_repos_sha.txt)
    DOCKER_BUILDKIT=1 docker build \
      --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base-staging:latest \
      --build-arg BUILDKIT_INLINE_CACHE=1 \
      --build-arg UNIFY_KEY=$$ORCHESTRA_API_KEY \
      --build-arg GITHUB_TOKEN=$$GITHUB_TOKEN \
      --build-arg BRANCH=${BRANCH_NAME} \
      --build-arg DEP_REPOS_SHA=$$DEP_SHA \
      -f deploy/Dockerfile \
      -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base-staging:preview-$${SLUG}-${SHORT_SHA} .
  secretEnv: ['ORCHESTRA_API_KEY', 'GITHUB_TOKEN']
  waitFor: ['compute-slug', 'pull-cache', 'resolve-dep-shas']

- name: 'gcr.io/cloud-builders/docker'
  id: 'push-image'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -euo pipefail
    SLUG=$(cat /workspace/slug.txt)
    docker push ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base-staging:preview-$${SLUG}-${SHORT_SHA}
  waitFor: ['build-image']

  # Trigger overlay build in unity-deploy.  The overlay's source isn't
  # part of the feature-branch story (only the base image is), so we
  # invoke against ``staging`` source and pass the per-branch slug,
  # base image, and unity tag as substitutions.  This avoids requiring
  # a pass-through ``feature/<slug>`` ref on the unity-deploy origin.
  # The overlay build uploads ``image_hash_staging_<slug>.txt`` so the
  # preview-environment Comms App revision picks up this image.
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'trigger-overlay'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -euo pipefail
    SLUG=$(cat /workspace/slug.txt)
    UNITY_TAG="preview-$${SLUG}-${SHORT_SHA}"
    BASE_IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity-base-staging:$${UNITY_TAG}"
    gcloud builds triggers run unity-deploy-preview \
      --project=${PROJECT_ID} \
      --region=${_REGION} \
      --branch=staging \
      --substitutions=_BASE_IMAGE=$${BASE_IMAGE},_UNITY_TAG=$${UNITY_TAG},_SLUG=$${SLUG}
  waitFor: ['push-image']

options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

substitutions:
  _REGION: 'us-central1'
  _REPOSITORY: 'unity'

availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_ID}/secrets/ORCHESTRA_API_KEY/versions/latest
    env: 'ORCHESTRA_API_KEY'
  - versionName: projects/${PROJECT_ID}/secrets/DEVBOT_GITHUB_TOKEN/versions/latest
    env: 'GITHUB_TOKEN'

timeout: '1800s'
