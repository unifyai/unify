<!DOCTYPE html>
<html>
<head>
    <title>Desktop</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        params.set('resize', 'scale');
        params.set('autoconnect', '1');
        params.set('reconnect', '1');
        params.set('show_dot', '1');
        // Redirect in-frame instead of nesting vnc.html. Nested iframes leave noVNC
        // connected but with a black canvas through the Caddy /desktop/* proxy.
        window.location.replace(`vnc.html?${params}`);
    </script>
</head>
<body></body>
</html>
