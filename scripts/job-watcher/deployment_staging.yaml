apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-watcher
  namespace: staging
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["list", "watch", "get"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-watcher
  namespace: staging
subjects:
- kind: ServiceAccount
  name: comm-sa
  namespace: staging
roleRef:
  kind: Role
  name: job-watcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-watcher-staging
  namespace: staging
  labels:
    app: job-watcher-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-watcher-staging
  template:
    metadata:
      labels:
        app: job-watcher-staging
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      serviceAccountName: comm-sa
      containers:
      - name: job-watcher-staging
        image: us-central1-docker.pkg.dev/responsive-city-458413-a2/unity/job-watcher-staging:latest
        command: ["kopf", "run", "watcher.py", "--liveness=http://0.0.0.0:8080/healthz", "--verbose", "--namespace=staging", "--standalone"]
        ports:
        - containerPort: 8080
          name: health
        envFrom:
        - configMapRef:
            name: unity-config
        - secretRef:
            name: unity-secrets
        env:
        - name: WATCH_NAMESPACE
          value: staging
        - name: UNITY_COMMS_URL
          value: "https://unity-comms-app-staging-262420637606.us-central1.run.app"
        - name: ORCHESTRA_URL
          value: "https://api.staging.internal.saas.unify.ai/v0"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
