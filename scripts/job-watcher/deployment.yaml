apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-watcher
  namespace: production
  labels:
    app: job-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-watcher
  template:
    metadata:
      labels:
        app: job-watcher
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      serviceAccountName: comm-sa
      containers:
      - name: job-watcher
        image: us-central1-docker.pkg.dev/responsive-city-458413-a2/unity/job-watcher:latest
        ports:
        - containerPort: 8080
          name: health
        envFrom:
        - configMapRef:
            name: unity-config
        - secretRef:
            name: unity-secrets
        env:
        - name: WATCH_NAMESPACE
          value: production
        - name: UNITY_COMMS_URL
          value: "https://unity-comms-app-262420637606.us-central1.run.app"
        - name: ORCHESTRA_URL
          value: "https://api.unify.ai/v0"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
