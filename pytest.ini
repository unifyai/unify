[pytest]
pythonpath = .
testpaths = tests
addopts = --capture=tee-sys --log-cli-level=INFO --import-mode=importlib
asyncio_default_test_loop_scope = function
generate_report_on_test = True
console_output_style = progress-even-when-capture-no
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration (deselect with '-m "not integration"')
    unit: marks tests as unit (deselect with '-m "not unit"')
    vision: marks tests as vision (deselect with '-m "not vision"')
    requires_orchestra: marks tests requiring a running Orchestra server (auto-skipped if unavailable)
    real_comms_functions: opt out of the universal comms stub (for tests exercising real comms_utils functions with mocked deps)
    llm_call: marks tests as requiring an LLM call (deselect with '-m "not llm_call"')
    timeout(seconds): marks tests with an expected timeout budget
filterwarnings =
    ignore:Using `@model_validator` with mode='after' on a classmethod is deprecated:DeprecationWarning:docling_core
    ignore:Importing 'parser.split_arg_string' is deprecated:DeprecationWarning:click
    ignore:Importing 'parser.split_arg_string' is deprecated:DeprecationWarning:spacy
    ignore:Importing 'parser.split_arg_string' is deprecated:DeprecationWarning:weasel
