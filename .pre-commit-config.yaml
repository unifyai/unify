# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: '\.cache\.json$'
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: check-ast
  - id: trailing-whitespace
  - id: check-toml
  - id: end-of-file-fixer

- repo: https://github.com/asottile/add-trailing-comma
  rev: v3.1.0
  hooks:
  - id: add-trailing-comma

- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: v2.14.0
  hooks:
  - id: pretty-format-yaml
    args:
    - --autofix
    - --preserve-quotes
    - --indent=2

- repo: https://github.com/Yelp/detect-secrets
  rev: v1.5.0
  hooks:
  - id: detect-secrets
    args: ['--baseline', '.secrets.baseline']
    exclude: |
      (?x)^(
        \.secrets\.baseline$|
        uv\.lock$|
        agent-service/package-lock\.json$|
        agent-service/node_modules/.*|
        \.venv/.*|
        logs/.*|
        assets/.*|
        scripts/skill_migration/builtins_skills\.lock\.json$|
        unify/guidance_manager/builtins_guidance\.json$|
        .*/__pycache__/.*
      )$

- repo: local
  hooks:
  - id: autoflake
    name: autoflake
    entry: uv run autoflake
    language: system
    types: [python]
    args: [--in-place, --remove-all-unused-imports, --remove-duplicate-keys]
    exclude: |
      (?x)^(
        .*/__init__\.py      # Exclude all __init__.py files
      )$

  - id: black
    name: Format with Black
    entry: uv run black
    language: system
    types: [python]

  - id: check-no-release-versioning
    name: no first-party release versioning
    entry: python3 scripts/check_no_release_versioning.py
    language: system
    pass_filenames: false

  - id: block-cursoragent-identity
    name: block cursoragent git identity
    entry: scripts/check_git_identity.sh
    language: system
    pass_filenames: false
    always_run: true
