<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}democorp Connect{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }

        /* Sidebar */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 60px;
            background: #3b2d5f; display: flex; flex-direction: column; align-items: center;
            padding-top: 12px; z-index: 100;
        }
        .sidebar-logo {
            width: 36px; height: 36px; background: #7c5cbf; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 14px; margin-bottom: 20px;
        }
        .sidebar-item {
            width: 44px; height: 44px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; margin-bottom: 4px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
            color: #b0a0cc; font-size: 9px; transition: background 0.15s;
        }
        .sidebar-item:hover, .sidebar-item.active { background: #4d3d6f; color: white; }
        .sidebar-icon { font-size: 18px; margin-bottom: 2px; }

        /* Left panel */
        .left-panel {
            position: fixed; left: 60px; top: 0; bottom: 0; width: 220px;
            background: #fff; border-right: 1px solid #e0e0e0; padding: 16px 0;
            overflow-y: auto;
        }
        .left-panel h3 {
            font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 8px 16px 4px; margin-top: 12px;
        }
        .left-panel h3:first-child { margin-top: 0; }
        .left-panel a {
            display: flex; align-items: center; padding: 6px 16px; text-decoration: none;
            color: #333; font-size: 13px; transition: background 0.1s;
        }
        .left-panel a:hover { background: #f0f0f0; }
        .left-panel a.active { background: #ede7f6; color: #5c3d99; font-weight: 600; }
        .left-panel .group-dot {
            width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0;
        }

        /* Main content */
        .main { margin-left: 280px; padding: 24px 32px; max-width: 900px; }

        /* Header bar */
        .topbar {
            margin-left: 60px; position: fixed; top: 0; right: 0; left: 60px;
            height: 50px; background: #fff; border-bottom: 1px solid #e0e0e0;
            display: flex; align-items: center; padding: 0 24px; z-index: 50;
        }
        .topbar-search {
            margin-left: 230px; flex: 1; max-width: 400px;
        }
        .topbar-search input {
            width: 100%; padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px;
            font-size: 13px; background: #f5f5f5;
        }
        .topbar-user {
            margin-left: auto; display: flex; align-items: center; gap: 12px;
        }
        .topbar-avatar {
            width: 32px; height: 32px; border-radius: 50%; background: #7c5cbf;
            color: white; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 600;
        }

        .content-area { margin-top: 50px; }

        /* Cards */
        .card {
            background: white; border-radius: 8px; padding: 20px;
            margin-bottom: 16px; border: 1px solid #e8e8e8;
        }

        /* Thread list */
        .thread-item {
            display: flex; align-items: flex-start; padding: 14px 0;
            border-bottom: 1px solid #f0f0f0; text-decoration: none; color: inherit;
        }
        .thread-item:last-child { border-bottom: none; }
        .thread-item:hover { background: #fafafa; }
        .thread-avatar {
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white;
            font-weight: 600; font-size: 14px; flex-shrink: 0; margin-right: 14px;
        }
        .thread-content { flex: 1; }
        .thread-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 4px; }
        .thread-meta { font-size: 12px; color: #888; }
        .thread-category {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 500; margin-left: 8px;
        }
        .thread-replies {
            font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px;
            margin-left: auto; flex-shrink: 0; padding-left: 16px;
        }

        /* Thread detail */
        .post { padding: 16px 0; border-bottom: 1px solid #f0f0f0; }
        .post:last-child { border-bottom: none; }
        .post-header { display: flex; align-items: center; margin-bottom: 10px; }
        .post-avatar {
            width: 36px; height: 36px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white;
            font-weight: 600; font-size: 13px; flex-shrink: 0; margin-right: 12px;
        }
        .post-author { font-weight: 600; font-size: 14px; color: #333; }
        .post-org { font-size: 12px; color: #7c5cbf; }
        .post-date { font-size: 11px; color: #aaa; margin-left: auto; }
        .post-body { font-size: 14px; line-height: 1.6; color: #444; white-space: pre-wrap; padding-left: 48px; }
        .reply { margin-left: 24px; }
        .reply .post-body { padding-left: 48px; }

        /* Login page */
        .login-container {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: #3b2d5f;
        }
        .login-box {
            background: white; border-radius: 12px; padding: 40px;
            width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }
        .login-box h1 {
            color: #3b2d5f; font-size: 24px; margin-bottom: 8px; text-align: center;
        }
        .login-box .subtitle {
            color: #888; font-size: 13px; text-align: center; margin-bottom: 24px;
        }
        .login-box label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
        .login-box input[type="text"], .login-box input[type="password"] {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 14px; margin-bottom: 16px;
        }
        .login-box button {
            width: 100%; padding: 10px; background: #7c5cbf; color: white;
            border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
        }
        .login-box button:hover { background: #6a4daa; }
        .login-error { color: #d32f2f; font-size: 13px; text-align: center; margin-bottom: 12px; }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 500;
        }
        .badge-green { background: #e8f5e9; color: #2e7d32; }
        .badge-blue { background: #e3f2fd; color: #1565c0; }
        .badge-orange { background: #fff3e0; color: #e65100; }
        .badge-purple { background: #ede7f6; color: #5c3d99; }
        .badge-red { background: #fce4ec; color: #c62828; }

        .back-link { font-size: 13px; color: #7c5cbf; text-decoration: none; margin-bottom: 16px; display: inline-block; }
        .back-link:hover { text-decoration: underline; }

        h2 { font-size: 20px; color: #333; margin-bottom: 16px; }
    </style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
