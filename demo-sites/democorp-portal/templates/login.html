{% extends "base.html" %}
{% block title %}Sign In — democorp Connect{% endblock %}
{% block body %}
<div class="login-container">
    <div class="login-box">
        <h1>democorp Connect</h1>
        <p class="subtitle">Carbon Club Community Portal</p>
        {% if error %}
        <p class="login-error">{{ error }}</p>
        {% endif %}
        <form method="post" action="/login">
            <label for="username">Email</label>
            <input type="text" id="username" name="username" placeholder="steph@yourdemocorp.co.uk" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <button type="submit">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
